    <rect x="84" y="1019" width="112" height="162" fill="none" stroke="#FFD23F" stroke-width="1"/>
    <text x="140" y="1050" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">GAINING &amp;</text>
    <text x="140" y="1064" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">SUSTAINING</text>
    <text x="140" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">COMPETITIVE</text>
    <text x="140" y="1092" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">ADVANTAGE</text>
    <line x1="100" y1="1111" x2="180" y2="1111" stroke="#FFD23F" stroke-width="1"/>
    <text x="140" y="1135" text-anchor="middle" font-size="9" fill="#FFD23F">The classic</text>
    <text x="140" y="1148" text-anchor="middle" font-size="9" fill="#FFD23F">RBV textbook</text>
    <text x="140" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">BARNEY · 1996</text>
  </g>

  <g>
    <rect x="240" y="1015" width="120" height="170" fill="#7A1F2B"/>
    <rect x="244" y="1019" width="112" height="162" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="300" y="1050" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">STRATEGIC</text>
    <text x="300" y="1064" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">MANAGEMENT</text>
    <text x="300" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">&amp; COMPETITIVE</text>
    <text x="300" y="1092" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">ADVANTAGE</text>
    <line x1="260" y1="1111" x2="340" y2="1111" stroke="#FFFFFF" stroke-width="1"/>
    <text x="300" y="1135" text-anchor="middle" font-size="9" fill="#FFFFFF">with Hesterly</text>
    <text x="300" y="1148" text-anchor="middle" font-size="9" fill="#FFFFFF">(7th ed)</text>
    <text x="300" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">BARNEY · 2009</text>
  </g>

  <g>
    <rect x="400" y="1015" width="120" height="170" fill="#264653"/>
    <rect x="404" y="1019" width="112" height="162" fill="none" stroke="#F4A261" stroke-width="1"/>
    <text x="460" y="1050" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">RESOURCE-</text>
    <text x="460" y="1064" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">BASED</text>
    <text x="460" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">THEORY</text>
    <line x1="420" y1="1097" x2="500" y2="1097" stroke="#F4A261" stroke-width="1"/>
    <text x="460" y="1128" text-anchor="middle" font-size="9" fill="#F4A261">Creating &amp;</text>
    <text x="460" y="1141" text-anchor="middle" font-size="9" fill="#F4A261">Sustaining</text>
    <text x="460" y="1154" text-anchor="middle" font-size="9" fill="#F4A261">Competitive Edge</text>
    <text x="460" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">BARNEY · 2007</text>
  </g>

  <g>
