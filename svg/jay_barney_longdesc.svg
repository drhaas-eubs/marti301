<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Jay Barney -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Jay Barney</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">VRIO and the Resource-Based View of Competitive Advantage</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">b. 1954 · Presidential Professor · Eccles School · University of Utah</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY BARNEY, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">Why do two firms in the same industry</text>
    <text x="52" y="240" font-size="11.5" fill="#222">perform so differently? Porter's Five</text>
    <text x="52" y="258" font-size="11.5" fill="#222">Forces won't tell you. Barney does:</text>
    <text x="52" y="276" font-size="11.5" fill="#222">your competitive advantage lives inside</text>
    <text x="52" y="294" font-size="11.5" fill="#222">your firm's resources — and his VRIO</text>
    <text x="52" y="312" font-size="11.5" fill="#222">filter shows you which of yours can</text>
    <text x="52" y="330" font-size="11.5" fill="#222">actually sustain it in the AI era.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">PhD Yale (1982). Presidential Professor</text>
    <text x="52" y="428" font-size="11.5" fill="#222">at the David Eccles School of Business,</text>
    <text x="52" y="446" font-size="11.5" fill="#222">University of Utah. Previously Ohio State,</text>
    <text x="52" y="464" font-size="11.5" fill="#222">Texas A&amp;M. Built on Birger Wernerfelt's</text>
    <text x="52" y="482" font-size="11.5" fill="#222">1984 “Resource-Based View of the Firm”</text>
    <text x="52" y="500" font-size="11.5" fill="#222">and Edith Penrose's 1959 theory of growth.</text>
    <text x="52" y="518" font-size="11.5" fill="#222">Reframed strategy from outside-in to inside-out.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. VRIO Framework</text>
<text x="220" y="610" font-size="10" fill="#222">Valuable · Rare · Inimitable ·</text>
<text x="220" y="626" font-size="10" fill="#222">Organized — 4-column filter</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. Resource-Based View</text>
<text x="220" y="646" font-size="10" fill="#222">Resources &amp; capabilities drive</text>
<text x="220" y="662" font-size="10" fill="#222">competitive heterogeneity</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Competitive Heterogeneity</text>
<text x="220" y="682" font-size="10" fill="#222">Why same-industry firms</text>
<text x="220" y="698" font-size="10" fill="#222">earn different returns</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Resource Mobility Test</text>
<text x="220" y="718" font-size="10" fill="#222">Can rivals buy or build it?</text>
<text x="220" y="734" font-size="10" fill="#222">If yes → not sustainable</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Path Dependency</text>
<text x="220" y="754" font-size="10" fill="#222">History matters: today's</text>
<text x="220" y="770" font-size="10" fill="#222">advantage built yesterday</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> List your firm's tangible + intangible resources</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Score each on VRIO — drop the non-V's first</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> For Rare resources, test imitability honestly</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Check Organisation: do systems support the resource?</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Apply specifically to your AI / data / talent stack</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Re-run quarterly — resource value erodes fast</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Sustained advantage comes</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">from resources, not industry position.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Jay Barney</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Not all resources are</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">strategically valuable.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Jay Barney</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• “Inimitable” hard to verify</text>
    <text x="455" y="636" font-size="10.5" fill="#222">before competitors actually try</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Inside-out view ignores</text>
    <text x="455" y="668" font-size="10.5" fill="#222">industry shifts (Porter critique)</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Critics: tautological — what's</text>
    <text x="455" y="700" font-size="10.5" fill="#222">rare must be rare</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• Less actionable for resource</text>
    <text x="455" y="732" font-size="10.5" fill="#222">acquisition decisions</text>
    <text x="442" y="748" font-size="10.5" fill="#222">• Underweights ecosystem-level</text>
    <text x="455" y="764" font-size="10.5" fill="#222">effects in platform economies</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• 1991 paper one of the most</text>
    <text x="455" y="844" font-size="10.5" fill="#222">cited in management (40k+)</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• VRIO standard in every MBA</text>
    <text x="455" y="876" font-size="10.5" fill="#222">strategy textbook worldwide</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• Direct foundation for</text>
    <text x="455" y="908" font-size="10.5" fill="#222">dynamic-capabilities theory</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• Anchors data-as-asset and</text>
    <text x="455" y="940" font-size="10.5" fill="#222">AI-talent-as-moat thinking</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• Strategic Management Journal</text>
    <text x="455" y="972" font-size="10.5" fill="#222">recognised him as best-cited</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
