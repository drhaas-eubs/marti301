    <text x="300" y="1141" text-anchor="middle" font-size="9" fill="#FFFFFF">Understanding</text>
    <text x="300" y="1154" text-anchor="middle" font-size="9" fill="#FFFFFF">Debt Crises</text>
    <text x="300" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">DALIO · 2018</text>
  </g>

  <g>
    <rect x="400" y="1015" width="120" height="170" fill="#1D2660"/>
    <rect x="404" y="1019" width="112" height="162" fill="none" stroke="#FFD23F" stroke-width="1"/>
    <text x="460" y="1050" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">PRINCIPLES FOR</text>
