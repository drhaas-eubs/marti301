    <text x="460" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">WORLD ORDER</text>
    <line x1="420" y1="1097" x2="500" y2="1097" stroke="#FFD23F" stroke-width="1"/>
    <text x="460" y="1135" text-anchor="middle" font-size="9" fill="#FFD23F">Why Nations</text>
    <text x="460" y="1148" text-anchor="middle" font-size="9" fill="#FFD23F">Succeed and Fail</text>
    <text x="460" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">DALIO · 2021</text>
  </g>

  <g>
    <rect x="560" y="1015" width="120" height="170" fill="#0F4C3A"/>
