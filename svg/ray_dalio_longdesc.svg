    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Pain plus reflection equals</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">progress.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Ray Dalio</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;He who lives by the crystal</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">ball eats ground glass.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Ray Dalio</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• Bridgewater performance has</text>
    <text x="455" y="636" font-size="10.5" fill="#222">lagged peers since ~2015</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• “Radical transparency” culture</text>
    <text x="455" y="668" font-size="10.5" fill="#222">reportedly harsh in practice</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Big Cycle thesis is inspiring</text>
    <text x="455" y="700" font-size="10.5" fill="#222">but hard to falsify</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• Risk parity hit hard in</text>
    <text x="455" y="732" font-size="10.5" fill="#222">2022 rate shock</text>
    <text x="442" y="748" font-size="10.5" fill="#222">• Critics: rules-based system</text>
    <text x="455" y="764" font-size="10.5" fill="#222">still rests on his judgement</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• Largest hedge fund ever built</text>
    <text x="455" y="844" font-size="10.5" fill="#222">(peak ~$160B AUM)</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• Pioneered risk parity / All</text>
    <text x="455" y="876" font-size="10.5" fill="#222">Weather across the industry</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• “Principles” sold &gt; 5 million</text>
    <text x="455" y="908" font-size="10.5" fill="#222">copies; ubiquitous in finance</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• “Big Debt Crises” a free PDF</text>
    <text x="455" y="940" font-size="10.5" fill="#222">download (4M+ downloads)</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• Bridgewater early adopter of</text>
    <text x="455" y="972" font-size="10.5" fill="#222">ML for systematic macro</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
