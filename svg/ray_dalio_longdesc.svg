<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Ray Dalio -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Ray Dalio</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">Principles, Radical Transparency, and Algorithmic Investing</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">b. 1949 · Founder · Bridgewater Associates</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY DALIO, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">How do you systematise judgement at scale in</text>
    <text x="52" y="240" font-size="11.5" fill="#222">an investment firm? Dalio built the largest</text>
    <text x="52" y="258" font-size="11.5" fill="#222">hedge fund in history by codifying human</text>
    <text x="52" y="276" font-size="11.5" fill="#222">decision-making into rules — the precursor</text>
    <text x="52" y="294" font-size="11.5" fill="#222">to today's AI-augmented investment process.</text>
    <text x="52" y="312" font-size="11.5" fill="#222">His Principles bridge human and algorithmic.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">Founded Bridgewater Associates from his</text>
    <text x="52" y="428" font-size="11.5" fill="#222">two-bedroom apartment in 1975. Self-taught</text>
    <text x="52" y="446" font-size="11.5" fill="#222">macro investor influenced by debt-cycle</text>
    <text x="52" y="464" font-size="11.5" fill="#222">history (Reinhart &amp; Rogoff lineage). Long</text>
    <text x="52" y="482" font-size="11.5" fill="#222">interest in cognitive psychology shaped</text>
    <text x="52" y="500" font-size="11.5" fill="#222">the firm's “idea meritocracy” culture.</text>
    <text x="52" y="518" font-size="11.5" fill="#222">Stepped back from CIO role in 2022.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. Principles</text>
<text x="220" y="610" font-size="10" fill="#222">~500 codified rules for life</text>
<text x="220" y="626" font-size="10" fill="#222">and work decisions (2017)</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. All-Weather Portfolio</text>
<text x="220" y="646" font-size="10" fill="#222">Risk parity across 4 economic</text>
<text x="220" y="662" font-size="10" fill="#222">regimes (1996)</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Pure Alpha Strategy</text>
<text x="220" y="682" font-size="10" fill="#222">Uncorrelated systematic</text>
<text x="220" y="698" font-size="10" fill="#222">macro bets, levered</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Idea Meritocracy</text>
<text x="220" y="718" font-size="10" fill="#222">Believability-weighted voting</text>
<text x="220" y="734" font-size="10" fill="#222">+ radical transparency</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Big Cycle / Debt Cycle</text>
<text x="220" y="754" font-size="10" fill="#222">Long-term debt and political</text>
<text x="220" y="770" font-size="10" fill="#222">cycles drive markets</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Write down your decision principles, openly</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Apply believability-weighted voting in teams</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Diversify across 4 regimes, not 4 asset classes</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Run pre-mortems and “dot collector” feedback</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Stress-test against Big Cycle scenarios</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Use AI to encode and scale, not replace, judgement</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
