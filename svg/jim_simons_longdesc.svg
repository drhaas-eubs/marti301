<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Jim Simons -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Jim Simons</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">The Man Who Solved the Market — Pure Mathematics Meets Pure Alpha</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">1938 – 2024 · Founder · Renaissance Technologies · Mathematician</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY SIMONS, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">What does the most successful systematic</text>
    <text x="52" y="240" font-size="11.5" fill="#222">fund in history actually do? Jim Simons</text>
    <text x="52" y="258" font-size="11.5" fill="#222">built Renaissance Technologies — and the</text>
    <text x="52" y="276" font-size="11.5" fill="#222">Medallion Fund's ~66% gross returns over</text>
    <text x="52" y="294" font-size="11.5" fill="#222">30 years remain the proof case that data-</text>
    <text x="52" y="312" font-size="11.5" fill="#222">driven, ML-style investing can dominate.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">PhD Mathematics, Berkeley (1961). Code-</text>
    <text x="52" y="428" font-size="11.5" fill="#222">breaker at the IDA. Chair of Math, Stony Brook</text>
    <text x="52" y="446" font-size="11.5" fill="#222">(1968–1976). Founded Renaissance Technologies</text>
    <text x="52" y="464" font-size="11.5" fill="#222">in 1982. Hired physicists, mathematicians,</text>
    <text x="52" y="482" font-size="11.5" fill="#222">linguists — never finance MBAs. Built the</text>
    <text x="52" y="500" font-size="11.5" fill="#222">Simons Foundation (now $4B+ endowment for</text>
    <text x="52" y="518" font-size="11.5" fill="#222">math &amp; basic science). Died May 10, 2024.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. Pattern Recognition</text>
<text x="220" y="610" font-size="10" fill="#222">Statistical patterns in</text>
<text x="220" y="626" font-size="10" fill="#222">noisy market data</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. Hidden Markov Models</text>
<text x="220" y="646" font-size="10" fill="#222">Regime-switching state-space</text>
<text x="220" y="662" font-size="10" fill="#222">models for prices</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Signal Lifecycle</text>
<text x="220" y="682" font-size="10" fill="#222">Discover · validate ·</text>
<text x="220" y="698" font-size="10" fill="#222">deploy · decay · retire</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Medallion Compounding</text>
<text x="220" y="718" font-size="10" fill="#222">Capacity-constrained, fee-</text>
<text x="220" y="734" font-size="10" fill="#222">heavy, employee-only fund</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Math-First Hiring</text>
<text x="220" y="754" font-size="10" fill="#222">Hire scientists, not finance —</text>
<text x="220" y="770" font-size="10" fill="#222">teach finance after</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Hire scientists; treat finance as a math problem</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Build the data infrastructure before the strategy</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Discover patterns, then test ruthlessly for spuriousness</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Use ensemble of weak signals, not one strong one</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Cap capacity to protect alpha decay</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Reinvest in research culture, not external marketing</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;We use math to make money —</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">pure and simple.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Jim Simons</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Past performance is the best</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">predictor of future success.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Jim Simons</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• Strategies famously secret —</text>
    <text x="455" y="636" font-size="10.5" fill="#222">no public framework</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Medallion closed to outsiders</text>
    <text x="455" y="668" font-size="10.5" fill="#222">since 1993 (employees only)</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Public-facing funds (Inst.</text>
    <text x="455" y="700" font-size="10.5" fill="#222">Equities) lagged in 2020/22</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• Replication impossible without</text>
    <text x="455" y="732" font-size="10.5" fill="#222">Renaissance's culture</text>
    <text x="442" y="748" font-size="10.5" fill="#222">• Pattern-found alpha may decay</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• Medallion's track record may be</text>
    <text x="455" y="844" font-size="10.5" fill="#222">the greatest in financial history</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• Renaissance employs ~300 PhDs</text>
    <text x="455" y="876" font-size="10.5" fill="#222">— model for quant industry</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• Simons Foundation transformed</text>
    <text x="455" y="908" font-size="10.5" fill="#222">US basic-science funding</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• Math2.0, Math For America</text>
    <text x="455" y="940" font-size="10.5" fill="#222">improved K-12 STEM teaching</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• “The Man Who Solved the Market”</text>
    <text x="455" y="972" font-size="10.5" fill="#222">(Zuckerman, 2019) the canonical bio</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
  <g>
    <rect x="80" y="1015" width="120" height="170" fill="#1A1A1A"/>
    <rect x="84" y="1019" width="112" height="162" fill="none" stroke="#E63946" stroke-width="1"/>
    <text x="140" y="1050" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">THE MAN</text>
    <text x="140" y="1064" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">WHO SOLVED</text>
    <text x="140" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">THE MARKET</text>
    <line x1="100" y1="1097" x2="180" y2="1097" stroke="#E63946" stroke-width="1"/>
    <text x="140" y="1128" text-anchor="middle" font-size="9" fill="#E63946">How Jim Simons</text>
    <text x="140" y="1141" text-anchor="middle" font-size="9" fill="#E63946">Launched the</text>
    <text x="140" y="1154" text-anchor="middle" font-size="9" fill="#E63946">Quant Revolution</text>
    <text x="140" y="1167" text-anchor="middle" font-size="9" fill="#E63946">(Zuckerman, 2019)</text>
    <text x="140" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">SIMONS · 2019</text>
  </g>

  <g>
    <rect x="240" y="1015" width="120" height="170" fill="#1D2660"/>
    <rect x="244" y="1019" width="112" height="162" fill="none" stroke="#FFD23F" stroke-width="1"/>
    <text x="300" y="1050" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">CHERN-</text>
    <text x="300" y="1064" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">SIMONS</text>
    <text x="300" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">THEORY</text>
    <line x1="260" y1="1097" x2="340" y2="1097" stroke="#FFD23F" stroke-width="1"/>
    <text x="300" y="1128" text-anchor="middle" font-size="9" fill="#FFD23F">Foundational math</text>
    <text x="300" y="1141" text-anchor="middle" font-size="9" fill="#FFD23F">(Annals of Math,</text>
    <text x="300" y="1154" text-anchor="middle" font-size="9" fill="#FFD23F">1974) — pre-finance</text>
    <text x="300" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">SIMONS · 1974</text>
  </g>

  <g>
    <rect x="400" y="1015" width="120" height="170" fill="#7A1F2B"/>
    <rect x="404" y="1019" width="112" height="162" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="460" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">MEDALLION</text>
    <text x="460" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">FUND</text>
    <line x1="420" y1="1088" x2="500" y2="1088" stroke="#FFFFFF" stroke-width="1"/>
    <text x="460" y="1128" text-anchor="middle" font-size="9" fill="#FFFFFF">~66% gross</text>
    <text x="460" y="1141" text-anchor="middle" font-size="9" fill="#FFFFFF">annual returns</text>
    <text x="460" y="1154" text-anchor="middle" font-size="9" fill="#FFFFFF">1988 – 2018</text>
    <text x="460" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">SIMONS · 1988</text>
  </g>

