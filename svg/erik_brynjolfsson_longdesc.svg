    <line x1="260" y1="1088" x2="340" y2="1088" stroke="#F4A261" stroke-width="1"/>
    <text x="300" y="1128" text-anchor="middle" font-size="9" fill="#F4A261">Work, Progress &amp;</text>
    <text x="300" y="1141" text-anchor="middle" font-size="9" fill="#F4A261">Prosperity in a Time</text>
    <text x="300" y="1154" text-anchor="middle" font-size="9" fill="#F4A261">of Brilliant Tech</text>
    <text x="300" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">BRYNJOLFSSON · 2014</text>
  </g>

  <g>
    <rect x="400" y="1015" width="120" height="170" fill="#2A9D8F"/>
    <rect x="404" y="1019" width="112" height="162" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="460" y="1050" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">MACHINE</text>
    <text x="460" y="1064" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">PLATFORM</text>
