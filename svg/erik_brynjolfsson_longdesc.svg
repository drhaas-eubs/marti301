<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Erik Brynjolfsson -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Erik Brynjolfsson</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">The Productivity J-Curve and the Economics of AI</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">b. 1962 · Director, Stanford Digital Economy Lab</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY BRYNJOLFSSON, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">Why does AI investment fail to lift productivity</text>
    <text x="52" y="240" font-size="11.5" fill="#222">in the short run? Brynjolfsson explains the</text>
    <text x="52" y="258" font-size="11.5" fill="#222">modern productivity paradox: AI requires</text>
    <text x="52" y="276" font-size="11.5" fill="#222">complementary investments — data, skills,</text>
    <text x="52" y="294" font-size="11.5" fill="#222">process redesign — before gains appear.</text>
    <text x="52" y="312" font-size="11.5" fill="#222">His work is the empirical bedrock for AI ROI.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">PhD Managerial Economics, Harvard (1991).</text>
    <text x="52" y="428" font-size="11.5" fill="#222">MIT Sloan (1991–2020), Stanford (2020–).</text>
    <text x="52" y="446" font-size="11.5" fill="#222">Director, Stanford Digital Economy Lab.</text>
    <text x="52" y="464" font-size="11.5" fill="#222">Built on the Solow Paradox tradition. Long</text>
    <text x="52" y="482" font-size="11.5" fill="#222">collaboration with Andrew McAfee. Drew on</text>
    <text x="52" y="500" font-size="11.5" fill="#222">production-function and intangible capital</text>
    <text x="52" y="518" font-size="11.5" fill="#222">research from Hal Varian and Carol Corrado.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. Productivity Paradox</text>
<text x="220" y="610" font-size="10" fill="#222">Why IT investment lags</text>
<text x="220" y="626" font-size="10" fill="#222">GDP statistics (1993)</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. Second Machine Age</text>
<text x="220" y="646" font-size="10" fill="#222">Digital tech as cognitive</text>
<text x="220" y="662" font-size="10" fill="#222">labor (2014, w/ McAfee)</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Productivity J-Curve</text>
<text x="220" y="682" font-size="10" fill="#222">Intangible capital depresses</text>
<text x="220" y="698" font-size="10" fill="#222">measured productivity (2018)</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Machine·Platform·Crowd</text>
<text x="220" y="718" font-size="10" fill="#222">3 great rebalancings of</text>
<text x="220" y="734" font-size="10" fill="#222">the digital economy (2017)</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. The Turing Trap</text>
<text x="220" y="754" font-size="10" fill="#222">Replacing vs augmenting</text>
<text x="220" y="770" font-size="10" fill="#222">AI design choice (2022)</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Inventory complementary investments needed</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Plan for the J-curve productivity dip</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Measure intangible / digital capital</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Choose augmentation over substitution</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Track organisational learning, not just tools</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Watch the Turing Trap (replacing &gt; augmenting)</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Technology is changing the</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">world faster than ever.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Erik Brynjolfsson</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;AI doesn't replace humans —</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">it augments them.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Erik Brynjolfsson</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• Productivity forecasts hard to</text>
    <text x="455" y="636" font-size="10.5" fill="#222">validate at firm level</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Solow paradox revisited but</text>
    <text x="455" y="668" font-size="10.5" fill="#222">not fully resolved</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Gains highly uneven across firms</text>
    <text x="455" y="700" font-size="10.5" fill="#222">and workers (“superstar economy”)</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• Models work less well outside</text>
    <text x="455" y="732" font-size="10.5" fill="#222">digital-intensive sectors</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• Reset the policy debate from</text>
    <text x="455" y="844" font-size="10.5" fill="#222">AI doom to AI nuance</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• Stanford Digital Economy Lab</text>
    <text x="455" y="876" font-size="10.5" fill="#222">shapes BLS, OECD measurement</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• “Turing Trap” became a lens</text>
    <text x="455" y="908" font-size="10.5" fill="#222">for responsible AI design</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• Standard reference for boards</text>
    <text x="455" y="940" font-size="10.5" fill="#222">evaluating GenAI investment</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
  <g>
    <rect x="80" y="1015" width="120" height="170" fill="#1A1A1A"/>
    <rect x="84" y="1019" width="112" height="162" fill="none" stroke="#E63946" stroke-width="1"/>
    <text x="140" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">RACE AGAINST</text>
    <text x="140" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">THE MACHINE</text>
    <line x1="100" y1="1088" x2="180" y2="1088" stroke="#E63946" stroke-width="1"/>
    <text x="140" y="1128" text-anchor="middle" font-size="9" fill="#E63946">How Digital Tech is</text>
    <text x="140" y="1141" text-anchor="middle" font-size="9" fill="#E63946">Accelerating</text>
    <text x="140" y="1154" text-anchor="middle" font-size="9" fill="#E63946">Innovation</text>
    <text x="140" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">BRYNJOLFSSON · 2011</text>
  </g>

  <g>
    <rect x="240" y="1015" width="120" height="170" fill="#264653"/>
    <rect x="244" y="1019" width="112" height="162" fill="none" stroke="#F4A261" stroke-width="1"/>
    <text x="300" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">THE SECOND</text>
