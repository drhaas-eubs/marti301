    <line x1="420" y1="1097" x2="500" y2="1097" stroke="#FFFFFF" stroke-width="1"/>
    <text x="460" y="1135" text-anchor="middle" font-size="9" fill="#FFFFFF">Harnessing Our</text>
    <text x="460" y="1148" text-anchor="middle" font-size="9" fill="#FFFFFF">Digital Future</text>
    <text x="460" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">BRYNJOLFSSON · 2017</text>
  </g>

