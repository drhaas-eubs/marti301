    <text x="140" y="1141" text-anchor="middle" font-size="9" fill="#FFD23F">Economics of</text>
    <text x="140" y="1154" text-anchor="middle" font-size="9" fill="#FFD23F">Artificial Intelligence</text>
    <text x="140" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">GOLDFARB · 2018</text>
  </g>

  <g>
