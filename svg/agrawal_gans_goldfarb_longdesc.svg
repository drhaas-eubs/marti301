<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Agrawal · Gans · Goldfarb -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Agrawal · Gans · Goldfarb</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">Prediction Machines and the Economics of Artificial Intelligence</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">b. 1967 / b. 1968 / b. 1972 · Rotman School · Toronto · Economists of AI</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY GOLDFARB, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">Why has AI become so important so fast?</text>
    <text x="52" y="240" font-size="11.5" fill="#222">Agrawal · Gans · Goldfarb give the most</text>
    <text x="52" y="258" font-size="11.5" fill="#222">elegant economic answer: AI dramatically</text>
    <text x="52" y="276" font-size="11.5" fill="#222">reduces the cost of prediction, and that</text>
    <text x="52" y="294" font-size="11.5" fill="#222">single price drop reshapes every business</text>
    <text x="52" y="312" font-size="11.5" fill="#222">decision that depends on forecasting.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">All three at the Rotman School of Management,</text>
    <text x="52" y="428" font-size="11.5" fill="#222">University of Toronto. Founded the Creative</text>
    <text x="52" y="446" font-size="11.5" fill="#222">Destruction Lab (CDL) in 2012, now a global</text>
    <text x="52" y="464" font-size="11.5" fill="#222">deep-tech accelerator. Built on Becker-style</text>
    <text x="52" y="482" font-size="11.5" fill="#222">price theory and the economics of digitisation</text>
    <text x="52" y="500" font-size="11.5" fill="#222">(Goldfarb &amp; Tucker). Hosted the seminal NBER</text>
    <text x="52" y="518" font-size="11.5" fill="#222">Economics of AI conferences (2017–).</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. Prediction Cost Drop</text>
<text x="220" y="610" font-size="10" fill="#222">AI = cheap prediction;</text>
<text x="220" y="626" font-size="10" fill="#222">everything else follows</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. AI Canvas</text>
<text x="220" y="646" font-size="10" fill="#222">Inputs · Action · Prediction ·</text>
<text x="220" y="662" font-size="10" fill="#222">Judgement · Outcome · Training</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Decomposing Decisions</text>
<text x="220" y="682" font-size="10" fill="#222">Separating prediction from</text>
<text x="220" y="698" font-size="10" fill="#222">judgement in any workflow</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Point vs System Solutions</text>
<text x="220" y="718" font-size="10" fill="#222">Local AI tools vs whole-</text>
<text x="220" y="734" font-size="10" fill="#222">workflow redesigns (2022)</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Economics of AI Diffusion</text>
<text x="220" y="754" font-size="10" fill="#222">Why adoption is slow despite</text>
<text x="220" y="770" font-size="10" fill="#222">the obvious payoff</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Find decisions where prediction is the bottleneck</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Use the AI Canvas to decompose each decision</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Cost out the prediction tax under status quo</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Choose between point fix and system redesign</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Define the human judgement layer explicitly</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Iterate — outcomes feed back into training data</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;AI's contribution is dropping</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">the price of prediction.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Agrawal · Gans · Goldfarb</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Cheap prediction changes</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">everything.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Agrawal · Gans · Goldfarb</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• Reductive: not all AI is prediction</text>
    <text x="455" y="636" font-size="10.5" fill="#222">(generation, search, classification)</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Underweights data, governance</text>
    <text x="455" y="668" font-size="10.5" fill="#222">and infrastructure costs</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Less guidance for GenAI / LLM</text>
    <text x="455" y="700" font-size="10.5" fill="#222">era (book predates ChatGPT)</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• Critics: framework risks treating</text>
    <text x="455" y="732" font-size="10.5" fill="#222">AI as a black-box utility</text>
    <text x="442" y="748" font-size="10.5" fill="#222">• System-redesign costs often</text>
    <text x="455" y="764" font-size="10.5" fill="#222">exceed the prediction savings</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• Defined the language for</text>
    <text x="455" y="844" font-size="10.5" fill="#222">AI economics in MBA curricula</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• Creative Destruction Lab a</text>
    <text x="455" y="876" font-size="10.5" fill="#222">global deep-tech accelerator</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• AI Canvas now standard in</text>
    <text x="455" y="908" font-size="10.5" fill="#222">product / strategy workshops</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• Power and Prediction (2022)</text>
    <text x="455" y="940" font-size="10.5" fill="#222">followed up Prediction Machines</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• Direct influence on policy</text>
    <text x="455" y="972" font-size="10.5" fill="#222">framing at OECD, WEF</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
  <g>
