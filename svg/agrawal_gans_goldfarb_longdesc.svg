    <text x="300" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">POWER AND</text>
    <text x="300" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">PREDICTION</text>
    <line x1="260" y1="1088" x2="340" y2="1088" stroke="#FFFFFF" stroke-width="1"/>
    <text x="300" y="1128" text-anchor="middle" font-size="9" fill="#FFFFFF">The Disruptive</text>
    <text x="300" y="1141" text-anchor="middle" font-size="9" fill="#FFFFFF">Economics of</text>
    <text x="300" y="1154" text-anchor="middle" font-size="9" fill="#FFFFFF">Artificial Intelligence</text>
    <text x="300" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">GOLDFARB · 2022</text>
  </g>

  <g>
    <rect x="400" y="1015" width="120" height="170" fill="#264653"/>
    <rect x="404" y="1019" width="112" height="162" fill="none" stroke="#F4A261" stroke-width="1"/>
    <text x="460" y="1050" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">THE</text>
    <text x="460" y="1064" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">ECONOMICS</text>
    <text x="460" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">OF AI</text>
    <line x1="420" y1="1097" x2="500" y2="1097" stroke="#F4A261" stroke-width="1"/>
