<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Russell Ackoff -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Russell Ackoff</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">The DIKW Pyramid and the Architecture of Wisdom</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">1919 – 2009 · Anheuser-Busch Professor Emeritus · Wharton</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY ACKOFF, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">What is the difference between data,</text>
    <text x="52" y="240" font-size="11.5" fill="#222">information, knowledge, and wisdom</text>
    <text x="52" y="258" font-size="11.5" fill="#222">— and why does it matter for the AI</text>
    <text x="52" y="276" font-size="11.5" fill="#222">systems you'll design? Ackoff's DIKW</text>
    <text x="52" y="294" font-size="11.5" fill="#222">pyramid is the canonical answer:</text>
    <text x="52" y="312" font-size="11.5" fill="#222">the architectural map of how value</text>
    <text x="52" y="330" font-size="11.5" fill="#222">is added at each layer.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">PhD Philosophy of Science, Penn (1947).</text>
    <text x="52" y="428" font-size="11.5" fill="#222">Anheuser-Busch Professor Emeritus at</text>
    <text x="52" y="446" font-size="11.5" fill="#222">Wharton. One of the founders of the</text>
    <text x="52" y="464" font-size="11.5" fill="#222">Operations Research Society. Built on</text>
    <text x="52" y="482" font-size="11.5" fill="#222">C. West Churchman, John Dewey's pragmatism,</text>
    <text x="52" y="500" font-size="11.5" fill="#222">and systems theory. Mentored a generation</text>
    <text x="52" y="518" font-size="11.5" fill="#222">of management scientists.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. DIKW Pyramid</text>
<text x="220" y="610" font-size="10" fill="#222">Data → Information →</text>
<text x="220" y="626" font-size="10" fill="#222">Knowledge → Wisdom</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. Idealized Design</text>
<text x="220" y="646" font-size="10" fill="#222">Design backwards from</text>
<text x="220" y="662" font-size="10" fill="#222">the perfect end-state</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Interactive Planning</text>
<text x="220" y="682" font-size="10" fill="#222">Stakeholder-driven planning</text>
<text x="220" y="698" font-size="10" fill="#222">across system levels</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Mess Management</text>
<text x="220" y="718" font-size="10" fill="#222">Treat tangled problem sets</text>
<text x="220" y="734" font-size="10" fill="#222">holistically, not solo</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Systems Thinking</text>
<text x="220" y="754" font-size="10" fill="#222">Optimise the whole, not</text>
<text x="220" y="770" font-size="10" fill="#222">the parts in isolation</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Audit your firm's data → information conversion</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Test if information is becoming knowledge (insight)</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Ask: are decisions reaching wisdom (right + ethical)?</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Apply Idealized Design to your AI roadmap</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Convene stakeholders for Interactive Planning</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Avoid optimising sub-systems at system's expense</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Managers don't solve problems</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">— they manage messes.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Russell Ackoff</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;The right thing done wrong is</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">worse than the wrong thing done right.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Russell Ackoff</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• DIKW pyramid debated as</text>
    <text x="455" y="636" font-size="10.5" fill="#222">oversimplified or wrong</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Wisdom layer often dropped</text>
    <text x="455" y="668" font-size="10.5" fill="#222">in IT / data-science use</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Less prescriptive than</text>
    <text x="455" y="700" font-size="10.5" fill="#222">stage-gate or OODA</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• Origins disputed (Cleveland</text>
    <text x="455" y="732" font-size="10.5" fill="#222">proposed similar in 1982)</text>
    <text x="442" y="748" font-size="10.5" fill="#222">• Critics: “wisdom” not a</text>
    <text x="455" y="764" font-size="10.5" fill="#222">testable concept in IT</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• DIKW the standard vocabulary</text>
    <text x="455" y="844" font-size="10.5" fill="#222">in knowledge management</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• “Ackoff's Best” a classic</text>
    <text x="455" y="876" font-size="10.5" fill="#222">reader on systems thinking</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• Influenced Senge's Fifth</text>
    <text x="455" y="908" font-size="10.5" fill="#222">Discipline (1990) directly</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• Wharton named the Ackoff</text>
    <text x="455" y="940" font-size="10.5" fill="#222">Center for Advancement</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• Direct anchor for MARTI301</text>
    <text x="455" y="972" font-size="10.5" fill="#222">Unit 2 DIKW framework</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
  <g>
    <rect x="80" y="1015" width="120" height="170" fill="#1D2660"/>
    <rect x="84" y="1019" width="112" height="162" fill="none" stroke="#FFD23F" stroke-width="1"/>
    <text x="140" y="1050" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">THE ART OF</text>
    <text x="140" y="1064" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">PROBLEM</text>
    <text x="140" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">SOLVING</text>
    <line x1="100" y1="1097" x2="180" y2="1097" stroke="#FFD23F" stroke-width="1"/>
    <text x="140" y="1135" text-anchor="middle" font-size="9" fill="#FFD23F">Accompanied by</text>
    <text x="140" y="1148" text-anchor="middle" font-size="9" fill="#FFD23F">Ackoff's Fables</text>
    <text x="140" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">ACKOFF · 1978</text>
  </g>

  <g>
    <rect x="240" y="1015" width="120" height="170" fill="#7A1F2B"/>
    <rect x="244" y="1019" width="112" height="162" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="300" y="1050" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">RE-CREATING</text>
    <text x="300" y="1064" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">THE</text>
    <text x="300" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">CORPORATION</text>
    <line x1="260" y1="1097" x2="340" y2="1097" stroke="#FFFFFF" stroke-width="1"/>
    <text x="300" y="1128" text-anchor="middle" font-size="9" fill="#FFFFFF">A Design of</text>
    <text x="300" y="1141" text-anchor="middle" font-size="9" fill="#FFFFFF">Organizations for</text>
    <text x="300" y="1154" text-anchor="middle" font-size="9" fill="#FFFFFF">the 21st Century</text>
    <text x="300" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">ACKOFF · 1999</text>
  </g>

  <g>
    <rect x="400" y="1015" width="120" height="170" fill="#264653"/>
    <rect x="404" y="1019" width="112" height="162" fill="none" stroke="#F4A261" stroke-width="1"/>
    <text x="460" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">ACKOFF'S</text>
    <text x="460" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">BEST</text>
    <line x1="420" y1="1088" x2="500" y2="1088" stroke="#F4A261" stroke-width="1"/>
    <text x="460" y="1128" text-anchor="middle" font-size="9" fill="#F4A261">His classic</text>
    <text x="460" y="1141" text-anchor="middle" font-size="9" fill="#F4A261">writings on</text>
    <text x="460" y="1154" text-anchor="middle" font-size="9" fill="#F4A261">management</text>
    <text x="460" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">ACKOFF · 1999</text>
  </g>

  <g>
    <rect x="560" y="1015" width="120" height="170" fill="#0F4C3A"/>
    <rect x="564" y="1019" width="112" height="162" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="620" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">IDEALIZED</text>
    <text x="620" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">DESIGN</text>
    <line x1="580" y1="1088" x2="660" y2="1088" stroke="#FFFFFF" stroke-width="1"/>
