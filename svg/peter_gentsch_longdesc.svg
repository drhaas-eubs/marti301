    <text x="140" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">SALES AND</text>
    <text x="140" y="1092" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">SERVICE</text>
