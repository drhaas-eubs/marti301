    <text x="140" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">OPTIMIZATION</text>
    <line x1="100" y1="1097" x2="180" y2="1097" stroke="#FFD23F" stroke-width="1"/>
    <text x="140" y="1128" text-anchor="middle" font-size="9" fill="#FFD23F">Financial Analysts</text>
    <text x="140" y="1141" text-anchor="middle" font-size="9" fill="#FFD23F">Journal</text>
