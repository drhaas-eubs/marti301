<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Black &amp; Litterman -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Black &amp; Litterman</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">The Black-Litterman Model — Bayesian Allocation Beyond MPT</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">1938 – 1995 · b. 1951 · Goldman Sachs · MIT Sloan · Kepos Capital</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY LITTERMAN, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">Why does naive Markowitz produce</text>
    <text x="52" y="240" font-size="11.5" fill="#222">extreme, unstable portfolios in practice?</text>
    <text x="52" y="258" font-size="11.5" fill="#222">Black and Litterman fixed it at Goldman</text>
    <text x="52" y="276" font-size="11.5" fill="#222">in 1990: blend market-implied returns</text>
    <text x="52" y="294" font-size="11.5" fill="#222">with investor views via Bayesian update.</text>
    <text x="52" y="312" font-size="11.5" fill="#222">The framework you'll use to make any</text>
    <text x="52" y="330" font-size="11.5" fill="#222">real-world AI allocation engine work.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">Fischer Black — Black-Scholes co-author</text>
    <text x="52" y="428" font-size="11.5" fill="#222">(1973), MIT, Chicago, then Goldman Sachs</text>
    <text x="52" y="446" font-size="11.5" fill="#222">Quant Strategies (1984–1995). Died too</text>
    <text x="52" y="464" font-size="11.5" fill="#222">early to share the 1997 Nobel.</text>
    <text x="52" y="482" font-size="11.5" fill="#222">Robert Litterman — PhD Minnesota.</text>
    <text x="52" y="500" font-size="11.5" fill="#222">Goldman Head of Quantitative Resources;</text>
    <text x="52" y="518" font-size="11.5" fill="#222">now Kepos Capital and One Earth Climate.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. Black-Litterman Model</text>
<text x="220" y="610" font-size="10" fill="#222">Bayesian blend of market</text>
<text x="220" y="626" font-size="10" fill="#222">equilibrium and investor views</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. Implied Equilibrium Returns</text>
<text x="220" y="646" font-size="10" fill="#222">Reverse-engineer expected</text>
<text x="220" y="662" font-size="10" fill="#222">returns from market caps</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Investor View Vector</text>
<text x="220" y="682" font-size="10" fill="#222">State your alpha views as</text>
<text x="220" y="698" font-size="10" fill="#222">linear combinations of assets</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Confidence-Weighted Blend</text>
<text x="220" y="718" font-size="10" fill="#222">Bayesian update: prior</text>
<text x="220" y="734" font-size="10" fill="#222">+ views → posterior portfolio</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Stability via Shrinkage</text>
<text x="220" y="754" font-size="10" fill="#222">Solves MPT's input-sensitivity</text>
<text x="220" y="770" font-size="10" fill="#222">and corner-portfolio problems</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Compute market-cap weights as the prior</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Reverse-engineer implied equilibrium returns</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> State your investor views explicitly (matrix P)</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Set confidence levels for each view</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Bayesian update → posterior expected returns</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Run mean-variance → sensible portfolio weights</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Markets are smarter than your</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">views — but your views still matter.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Black &amp; Litterman</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Combine equilibrium with</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">conviction.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Black &amp; Litterman</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• Still requires choosing</text>
    <text x="455" y="636" font-size="10.5" fill="#222">prior covariance matrix</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Confidence-level setting</text>
    <text x="455" y="668" font-size="10.5" fill="#222">is more art than science</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Underlying mean-variance</text>
    <text x="455" y="700" font-size="10.5" fill="#222">assumptions still apply</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• Math intimidating for</text>
    <text x="455" y="732" font-size="10.5" fill="#222">non-quant practitioners</text>
    <text x="442" y="748" font-size="10.5" fill="#222">• Less suited to fat-tailed</text>
    <text x="455" y="764" font-size="10.5" fill="#222">return distributions</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• Standard portfolio engine</text>
    <text x="455" y="844" font-size="10.5" fill="#222">in pension funds, robo-advisors</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• Solved Markowitz's biggest</text>
    <text x="455" y="876" font-size="10.5" fill="#222">practical problem (instability)</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• Litterman's 2003 “Modern</text>
    <text x="455" y="908" font-size="10.5" fill="#222">Investment Management” the</text>
    <text x="455" y="924" font-size="10.5" fill="#222">practitioner reference</text>
    <text x="442" y="940" font-size="10.5" fill="#222">• Now extended for ESG / factor</text>
    <text x="455" y="956" font-size="10.5" fill="#222">views (Kepos, climate funds)</text>
    <text x="442" y="972" font-size="10.5" fill="#222">• Anchors MARTI301 BL model</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
