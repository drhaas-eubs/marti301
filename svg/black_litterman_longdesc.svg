    <text x="460" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">INVESTOR VIEWS</text>
    <line x1="420" y1="1097" x2="500" y2="1097" stroke="#F4A261" stroke-width="1"/>
