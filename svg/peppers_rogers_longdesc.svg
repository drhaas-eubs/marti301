<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Peppers &amp; Rogers -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Peppers &amp; Rogers</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">The 1-to-1 Future — From Mass Marketing to Customer-Specific Relationships</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">b. 1950 / b. 1952 · Founders · Peppers &amp; Rogers Group · 1to1 Pioneers</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY ROGERS, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">Where does AI-powered hyper-personalisation</text>
    <text x="52" y="240" font-size="11.5" fill="#222">actually come from? Peppers &amp; Rogers wrote</text>
    <text x="52" y="258" font-size="11.5" fill="#222">the playbook in 1993 — long before the</text>
    <text x="52" y="276" font-size="11.5" fill="#222">tech existed. Their IDIC model is now the</text>
    <text x="52" y="294" font-size="11.5" fill="#222">operational logic of every modern CRM,</text>
    <text x="52" y="312" font-size="11.5" fill="#222">CDP and personalisation engine.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">Don Peppers — copywriter, advertising</text>
    <text x="52" y="428" font-size="11.5" fill="#222">executive (Lintas, Chiat/Day, Perkins/Butler).</text>
    <text x="52" y="446" font-size="11.5" fill="#222">Martha Rogers — PhD Mass Communications,</text>
    <text x="52" y="464" font-size="11.5" fill="#222">Bowling Green State University. Co-founded</text>
    <text x="52" y="482" font-size="11.5" fill="#222">Peppers &amp; Rogers Group consultancy in 1993,</text>
    <text x="52" y="500" font-size="11.5" fill="#222">the same year as their landmark book “The</text>
    <text x="52" y="518" font-size="11.5" fill="#222">One to One Future” — pre-internet CRM origin.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. IDIC Model</text>
<text x="220" y="610" font-size="10" fill="#222">Identify · Differentiate ·</text>
<text x="220" y="626" font-size="10" fill="#222">Interact · Customise</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. 1-to-1 Marketing</text>
<text x="220" y="646" font-size="10" fill="#222">Customer-specific dialogue</text>
<text x="220" y="662" font-size="10" fill="#222">instead of mass broadcast</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Customer Lifetime Value</text>
<text x="220" y="682" font-size="10" fill="#222">Long-term LTV as the</text>
<text x="220" y="698" font-size="10" fill="#222">measure that matters</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Trust Equation</text>
<text x="220" y="718" font-size="10" fill="#222">Reliability · Capability ·</text>
<text x="220" y="734" font-size="10" fill="#222">Intimacy / Self-orientation</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Learning Relationship</text>
<text x="220" y="754" font-size="10" fill="#222">Each interaction makes</text>
<text x="220" y="770" font-size="10" fill="#222">the next more valuable</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Identify customers individually (single ID)</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Differentiate by value AND by need</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Interact through dialogue, not broadcast</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Customise product / service / message</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Track LTV — not just transaction value</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Use AI to scale the learning relationship</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;The goal is not to make a</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">sale, it's to make a customer.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Peppers &amp; Rogers</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Treat different customers</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">differently.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Peppers &amp; Rogers</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• Pre-data-platform vintage</text>
    <text x="455" y="636" font-size="10.5" fill="#222">(1993) — execution gap was big</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Privacy / consent framing has</text>
    <text x="455" y="668" font-size="10.5" fill="#222">evolved (GDPR, CCPA, EU AI Act)</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Less attention to acquisition;</text>
    <text x="455" y="700" font-size="10.5" fill="#222">retention-heavy view</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• Trust equation borrowed from</text>
    <text x="455" y="732" font-size="10.5" fill="#222">Maister's earlier work</text>
    <text x="442" y="748" font-size="10.5" fill="#222">• Critics: easier said than scaled</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• “The One to One Future” named</text>
    <text x="455" y="844" font-size="10.5" fill="#222">one of HBR's 75 great ideas</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• Foundation of every modern</text>
    <text x="455" y="876" font-size="10.5" fill="#222">CRM, CDP, personalisation engine</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• Peppers &amp; Rogers Group →</text>
    <text x="455" y="908" font-size="10.5" fill="#222">Carlson Marketing → Aimia</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• Cited as direct precursor to</text>
    <text x="455" y="940" font-size="10.5" fill="#222">Marketing 4.0–6.0 thinking</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• Don Peppers also a leading</text>
    <text x="455" y="972" font-size="10.5" fill="#222">customer-trust speaker</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
  <g>
    <rect x="80" y="1015" width="120" height="170" fill="#1D2660"/>
    <rect x="84" y="1019" width="112" height="162" fill="none" stroke="#FFD23F" stroke-width="1"/>
    <text x="140" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">THE ONE TO</text>
    <text x="140" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">ONE FUTURE</text>
    <line x1="100" y1="1088" x2="180" y2="1088" stroke="#FFD23F" stroke-width="1"/>
    <text x="140" y="1128" text-anchor="middle" font-size="9" fill="#FFD23F">Building Relation-</text>
    <text x="140" y="1141" text-anchor="middle" font-size="9" fill="#FFD23F">ships One Customer</text>
    <text x="140" y="1154" text-anchor="middle" font-size="9" fill="#FFD23F">at a Time</text>
    <text x="140" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">ROGERS · 1993</text>
  </g>

  <g>
    <rect x="240" y="1015" width="120" height="170" fill="#7A1F2B"/>
    <rect x="244" y="1019" width="112" height="162" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="300" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">ENTERPRISE</text>
    <text x="300" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">ONE TO ONE</text>
    <line x1="260" y1="1088" x2="340" y2="1088" stroke="#FFFFFF" stroke-width="1"/>
    <text x="300" y="1128" text-anchor="middle" font-size="9" fill="#FFFFFF">Tools for Competing</text>
    <text x="300" y="1141" text-anchor="middle" font-size="9" fill="#FFFFFF">in the Interactive</text>
    <text x="300" y="1154" text-anchor="middle" font-size="9" fill="#FFFFFF">Age</text>
    <text x="300" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">ROGERS · 1997</text>
  </g>

  <g>
    <rect x="400" y="1015" width="120" height="170" fill="#264653"/>
    <rect x="404" y="1019" width="112" height="162" fill="none" stroke="#F4A261" stroke-width="1"/>
    <text x="460" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">RETURN ON</text>
    <text x="460" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">CUSTOMER</text>
    <line x1="420" y1="1088" x2="500" y2="1088" stroke="#F4A261" stroke-width="1"/>
    <text x="460" y="1128" text-anchor="middle" font-size="9" fill="#F4A261">Creating Maximum</text>
    <text x="460" y="1141" text-anchor="middle" font-size="9" fill="#F4A261">Value from Your</text>
    <text x="460" y="1154" text-anchor="middle" font-size="9" fill="#F4A261">Scarcest Resource</text>
    <text x="460" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">ROGERS · 2005</text>
  </g>

  <g>
    <rect x="560" y="1015" width="120" height="170" fill="#0F4C3A"/>
    <rect x="564" y="1019" width="112" height="162" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="620" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">EXTREME</text>
    <text x="620" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">TRUST</text>
    <line x1="580" y1="1088" x2="660" y2="1088" stroke="#FFFFFF" stroke-width="1"/>
    <text x="620" y="1128" text-anchor="middle" font-size="9" fill="#FFFFFF">Honesty as a</text>
    <text x="620" y="1141" text-anchor="middle" font-size="9" fill="#FFFFFF">Competitive</text>
    <text x="620" y="1154" text-anchor="middle" font-size="9" fill="#FFFFFF">Advantage</text>
    <text x="620" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">ROGERS · 2012</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="1210" x2="740" y2="1210" stroke="#00B388" stroke-width="1.5"/>
