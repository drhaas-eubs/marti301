<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Nassim Nicholas Taleb -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Nassim Nicholas Taleb</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">Black Swans, Antifragility, and Skin in the Game in the AI Era</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">b. 1960 · Distinguished Professor of Risk Engineering · NYU Tandon</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY TALEB, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">Why do AI risk models keep blowing up at</text>
    <text x="52" y="240" font-size="11.5" fill="#222">the worst moment? Taleb supplies the</text>
    <text x="52" y="258" font-size="11.5" fill="#222">vocabulary every quant needs but few</text>
    <text x="52" y="276" font-size="11.5" fill="#222">embrace: fat tails, black swans, antifragility,</text>
    <text x="52" y="294" font-size="11.5" fill="#222">skin in the game. Required mental model for</text>
    <text x="52" y="312" font-size="11.5" fill="#222">Unit 4 — financial AI risk management.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">Lebanese-American statistician, derivatives</text>
    <text x="52" y="428" font-size="11.5" fill="#222">trader (Empirica Capital), Distinguished</text>
    <text x="52" y="446" font-size="11.5" fill="#222">Professor of Risk Engineering at NYU Tandon.</text>
    <text x="52" y="464" font-size="11.5" fill="#222">PhD Management Science, Université Paris</text>
    <text x="52" y="482" font-size="11.5" fill="#222">Dauphine. Drew on Mandelbrot's fractal finance,</text>
    <text x="52" y="500" font-size="11.5" fill="#222">Popper's epistemology, Pascal's wager.</text>
    <text x="52" y="518" font-size="11.5" fill="#222">Adviser to Universa Investments (tail-risk fund).</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. Black Swan</text>
<text x="220" y="610" font-size="10" fill="#222">Rare, high-impact, retro-</text>
<text x="220" y="626" font-size="10" fill="#222">fitted events (2007)</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. Antifragility</text>
<text x="220" y="646" font-size="10" fill="#222">Systems that gain from</text>
<text x="220" y="662" font-size="10" fill="#222">disorder, not just survive</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Fat Tails / Mediocristan</text>
<text x="220" y="682" font-size="10" fill="#222">Power-law worlds vs</text>
<text x="220" y="698" font-size="10" fill="#222">Gaussian-friendly worlds</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Skin in the Game</text>
<text x="220" y="718" font-size="10" fill="#222">Symmetry: those deciding</text>
<text x="220" y="734" font-size="10" fill="#222">must bear downside risk</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Via Negativa</text>
<text x="220" y="754" font-size="10" fill="#222">Risk reduction by removal,</text>
<text x="220" y="770" font-size="10" fill="#222">not by addition</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Stress-test ALL forecasts against fat-tail scenarios</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Flag any AI model trained on Gaussian assumptions</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Insist on “skin in the game” for AI vendor decisions</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Apply via negativa — remove fragile components first</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Build optionality (positive convexity) into portfolios</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Avoid forecasts; design for uncertainty</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Show me your portfolio, not</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">your opinions.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Nassim Nicholas Taleb</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Antifragility is beyond</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">resilience or robustness.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Nassim Nicholas Taleb</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• Style is combative — content</text>
    <text x="455" y="636" font-size="10.5" fill="#222">often delivered as polemic</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Empirical claims about fat tails</text>
    <text x="455" y="668" font-size="10.5" fill="#222">contested in some asset classes</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• “Antifragility” hard to operationalise</text>
    <text x="455" y="700" font-size="10.5" fill="#222">for management practice</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• Limited engagement with</text>
    <text x="455" y="732" font-size="10.5" fill="#222">standard ML / econometrics</text>
    <text x="442" y="748" font-size="10.5" fill="#222">• Critics: dismisses entire fields</text>
    <text x="455" y="764" font-size="10.5" fill="#222">rather than engaging them</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• “Black Swan” entered global</text>
    <text x="455" y="844" font-size="10.5" fill="#222">risk-management vocabulary</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• “Skin in the Game” influenced</text>
    <text x="455" y="876" font-size="10.5" fill="#222">fintech / AI accountability debates</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• Universa thrived in March 2020</text>
    <text x="455" y="908" font-size="10.5" fill="#222">(4,000% return on tail hedges)</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• Sells &gt; 4 million books in</text>
    <text x="455" y="940" font-size="10.5" fill="#222">Incerto series (5 volumes)</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• Direct intellectual influence</text>
    <text x="455" y="972" font-size="10.5" fill="#222">on López de Prado et al.</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
  <g>
    <rect x="80" y="1015" width="120" height="170" fill="#1A1A1A"/>
    <rect x="84" y="1019" width="112" height="162" fill="none" stroke="#E63946" stroke-width="1"/>
    <text x="140" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">THE BLACK</text>
    <text x="140" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">SWAN</text>
    <line x1="100" y1="1088" x2="180" y2="1088" stroke="#E63946" stroke-width="1"/>
    <text x="140" y="1135" text-anchor="middle" font-size="9" fill="#E63946">The Impact of the</text>
    <text x="140" y="1148" text-anchor="middle" font-size="9" fill="#E63946">Highly Improbable</text>
    <text x="140" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">TALEB · 2007</text>
  </g>

  <g>
    <rect x="240" y="1015" width="120" height="170" fill="#7A1F2B"/>
    <rect x="244" y="1019" width="112" height="162" fill="none" stroke="#FFD23F" stroke-width="1"/>
    <text x="300" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">ANTIFRAGILE</text>
    <line x1="260" y1="1074" x2="340" y2="1074" stroke="#FFD23F" stroke-width="1"/>
    <text x="300" y="1135" text-anchor="middle" font-size="9" fill="#FFD23F">Things That Gain</text>
    <text x="300" y="1148" text-anchor="middle" font-size="9" fill="#FFD23F">from Disorder</text>
    <text x="300" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">TALEB · 2012</text>
  </g>

  <g>
    <rect x="400" y="1015" width="120" height="170" fill="#1D2660"/>
    <rect x="404" y="1019" width="112" height="162" fill="none" stroke="#FFD23F" stroke-width="1"/>
    <text x="460" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">SKIN IN</text>
    <text x="460" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">THE GAME</text>
    <line x1="420" y1="1088" x2="500" y2="1088" stroke="#FFD23F" stroke-width="1"/>
    <text x="460" y="1135" text-anchor="middle" font-size="9" fill="#FFD23F">Hidden Asymmetries</text>
    <text x="460" y="1148" text-anchor="middle" font-size="9" fill="#FFD23F">in Daily Life</text>
    <text x="460" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">TALEB · 2018</text>
  </g>

  <g>
    <rect x="560" y="1015" width="120" height="170" fill="#264653"/>
    <rect x="564" y="1019" width="112" height="162" fill="none" stroke="#F4A261" stroke-width="1"/>
    <text x="620" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">FOOLED BY</text>
    <text x="620" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">RANDOMNESS</text>
    <line x1="580" y1="1088" x2="660" y2="1088" stroke="#F4A261" stroke-width="1"/>
    <text x="620" y="1128" text-anchor="middle" font-size="9" fill="#F4A261">The Hidden Role</text>
    <text x="620" y="1141" text-anchor="middle" font-size="9" fill="#F4A261">of Chance in Life</text>
    <text x="620" y="1154" text-anchor="middle" font-size="9" fill="#F4A261">&amp; in the Markets</text>
    <text x="620" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">TALEB · 2001</text>
  </g>

