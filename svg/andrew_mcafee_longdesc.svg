    <text x="460" y="1141" text-anchor="middle" font-size="9" fill="#FFFFFF">Story of How We</text>
    <text x="460" y="1154" text-anchor="middle" font-size="9" fill="#FFFFFF">Learned to Prosper</text>
    <text x="460" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">MCAFEE · 2019</text>
