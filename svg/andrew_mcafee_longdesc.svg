<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Andrew McAfee -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Andrew McAfee</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">More From Less, the Geek Way, and the Digital Productivity Story</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">b. 1967 · Co-Director · MIT Initiative on the Digital Economy</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY MCAFEE, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">How do digital tools and AI actually change</text>
    <text x="52" y="240" font-size="11.5" fill="#222">what work and value creation look like inside</text>
    <text x="52" y="258" font-size="11.5" fill="#222">a firm? McAfee bridges economic data and</text>
    <text x="52" y="276" font-size="11.5" fill="#222">managerial practice — Race Against the</text>
    <text x="52" y="294" font-size="11.5" fill="#222">Machine, More From Less, The Geek Way —</text>
    <text x="52" y="312" font-size="11.5" fill="#222">showing the real mechanics of the digital firm.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">PhD MIS, Harvard Business School. Principal</text>
    <text x="52" y="428" font-size="11.5" fill="#222">Research Scientist at MIT Sloan and Co-Director</text>
    <text x="52" y="446" font-size="11.5" fill="#222">of the MIT Initiative on the Digital Economy</text>
    <text x="52" y="464" font-size="11.5" fill="#222">(IDE), founded with Brynjolfsson in 2014.</text>
    <text x="52" y="482" font-size="11.5" fill="#222">Earlier work on Enterprise 2.0, then digital</text>
    <text x="52" y="500" font-size="11.5" fill="#222">transformation, recently the cultural / org</text>
    <text x="52" y="518" font-size="11.5" fill="#222">norms of high-performing tech-native firms.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. Digital Dematerialisation</text>
<text x="220" y="610" font-size="10" fill="#222">Growing economy on shrinking</text>
<text x="220" y="626" font-size="10" fill="#222">physical inputs (“More From Less”)</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. Geek Norms (4)</text>
<text x="220" y="646" font-size="10" fill="#222">Science · Ownership · Speed ·</text>
<text x="220" y="662" font-size="10" fill="#222">Openness — culture stack</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Race Against / With</text>
<text x="220" y="682" font-size="10" fill="#222">Will tech replace or augment</text>
<text x="220" y="698" font-size="10" fill="#222">labour? Depends on choices</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Enterprise 2.0</text>
<text x="220" y="718" font-size="10" fill="#222">Web 2.0 patterns inside</text>
<text x="220" y="734" font-size="10" fill="#222">the firm (his 2009 framing)</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. 4 Capitalist Forces</text>
<text x="220" y="754" font-size="10" fill="#222">Tech progress · capitalism ·</text>
<text x="220" y="770" font-size="10" fill="#222">public awareness · gov't action</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Identify physical-resource intensity in your value chain</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Run a digital-dematerialisation audit</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Adopt the 4 Geek Norms in your operating culture</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Choose augmentation explicitly — don't drift</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Track the right scoreboards (productivity + ESG)</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Pair AI investment with org culture redesign</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;We've started doing more with</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">less.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Andrew McAfee</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;The future is already here,</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">just unevenly distributed.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Andrew McAfee</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• “Geek Way” generalises Silicon</text>
    <text x="455" y="636" font-size="10.5" fill="#222">Valley to all sectors — debated</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Optimism on dematerialisation</text>
    <text x="455" y="668" font-size="10.5" fill="#222">contested by some ecologists</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Less coverage of platform</text>
    <text x="455" y="700" font-size="10.5" fill="#222">monopolies / antitrust questions</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• Co-authored books overshadowed</text>
    <text x="455" y="732" font-size="10.5" fill="#222">his solo work for years</text>
    <text x="442" y="748" font-size="10.5" fill="#222">• Anglo-American case bias</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• Co-founded MIT IDE — global</text>
    <text x="455" y="844" font-size="10.5" fill="#222">hub for digital-economy research</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• “Race Against the Machine”</text>
    <text x="455" y="876" font-size="10.5" fill="#222">reframed automation debate</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• “More From Less” (2019)</text>
    <text x="455" y="908" font-size="10.5" fill="#222">redefined sustainability narrative</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• “The Geek Way” (2023)</text>
    <text x="455" y="940" font-size="10.5" fill="#222">influencing CEO culture playbooks</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• Frequent WEF / Davos speaker</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
