    <text x="140" y="1092" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">LEARNING</text>
    <line x1="100" y1="1111" x2="180" y2="1111" stroke="#E63946" stroke-width="1"/>
