<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Marcos López de Prado -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Marcos López de Prado</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">Advances in Financial Machine Learning — From Backtest Theatre to Real Alpha</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">b. 1974 · Professor · Cornell · CIO Quant Research, ADIA</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY PRADO, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">Why do most ML-driven trading strategies</text>
    <text x="52" y="240" font-size="11.5" fill="#222">you'll encounter fail in production?</text>
    <text x="52" y="258" font-size="11.5" fill="#222">López de Prado answers: p-hacked</text>
    <text x="52" y="276" font-size="11.5" fill="#222">backtests, look-ahead bias, IID fallacies.</text>
    <text x="52" y="294" font-size="11.5" fill="#222">His books are your rigorous scientific</text>
    <text x="52" y="312" font-size="11.5" fill="#222">foundation for any AI-driven investment</text>
    <text x="52" y="330" font-size="11.5" fill="#222">management you'll practise.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">PhD Financial Economics + PhD Mathematical</text>
    <text x="52" y="428" font-size="11.5" fill="#222">Finance. Professor of Practice at Cornell</text>
    <text x="52" y="446" font-size="11.5" fill="#222">University. Currently CIO of Quant Research</text>
    <text x="52" y="464" font-size="11.5" fill="#222">at Abu Dhabi Investment Authority (ADIA).</text>
    <text x="52" y="482" font-size="11.5" fill="#222">Previously Head of Machine Learning at</text>
    <text x="52" y="500" font-size="11.5" fill="#222">AQR, and Senior MD at Guggenheim. Member</text>
    <text x="52" y="518" font-size="11.5" fill="#222">of the National Academy of Sciences (Spain).</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. Backtest Validation Loop</text>
<text x="220" y="610" font-size="10" fill="#222">Train → validate → test →</text>
<text x="220" y="626" font-size="10" fill="#222">deploy → monitor (rigorous)</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. Alpha Generation Pipeline</text>
<text x="220" y="646" font-size="10" fill="#222">Data → signal extraction →</text>
<text x="220" y="662" font-size="10" fill="#222">portfolio — ML at signal stage</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Triple Barrier Method</text>
<text x="220" y="682" font-size="10" fill="#222">Take-profit · stop-loss ·</text>
<text x="220" y="698" font-size="10" fill="#222">time horizon for ML labels</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Backtest Overfit Prob.</text>
<text x="220" y="718" font-size="10" fill="#222">Quantify how likely your</text>
<text x="220" y="734" font-size="10" fill="#222">backtest is a false discovery</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Hierarchical Risk Parity</text>
<text x="220" y="754" font-size="10" fill="#222">ML-driven portfolio</text>
<text x="220" y="770" font-size="10" fill="#222">construction beyond Markowitz</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Build feature stationarity — never assume IID</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Use triple-barrier labels, not naive returns</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Apply meta-labelling for risk-adjusted signals</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Compute Probability of Backtest Overfit (PBO)</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Use HRP / Nested Clustering for portfolio construction</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Treat every “found” strategy with deep skepticism</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;The backtest is the most</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">overrated tool in finance.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Marcos López de Prado</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Most published trading</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">strategies are false positives.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Marcos López de Prado</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• Highly technical — entry</text>
    <text x="455" y="636" font-size="10.5" fill="#222">bar steep for non-quants</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Some methods (HRP) less</text>
    <text x="455" y="668" font-size="10.5" fill="#222">battle-tested vs Markowitz</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Style: provocative — “most</text>
    <text x="455" y="700" font-size="10.5" fill="#222">papers are wrong” framing</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• Limited treatment of GenAI</text>
    <text x="455" y="732" font-size="10.5" fill="#222">/ LLM-driven strategies</text>
    <text x="442" y="748" font-size="10.5" fill="#222">• ML focus crowds out behavioural</text>
    <text x="455" y="764" font-size="10.5" fill="#222">/ fundamental finance lenses</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• Defined the rigorous</text>
    <text x="455" y="844" font-size="10.5" fill="#222">scientific approach to ML</text>
    <text x="455" y="860" font-size="10.5" fill="#222">in finance</text>
    <text x="442" y="876" font-size="10.5" fill="#222">• “Advances in Financial</text>
    <text x="455" y="892" font-size="10.5" fill="#222">Machine Learning” a citation</text>
    <text x="455" y="908" font-size="10.5" fill="#222">classic in 5 years</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• Teaches at Cornell, Imperial,</text>
    <text x="455" y="940" font-size="10.5" fill="#222">Polytechnic Berkeley</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• ADIA role brings rigour to</text>
    <text x="455" y="972" font-size="10.5" fill="#222">one of the world's largest SWFs</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
