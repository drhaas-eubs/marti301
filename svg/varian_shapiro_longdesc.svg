    <line x1="420" y1="1097" x2="500" y2="1097" stroke="#F4A261" stroke-width="1"/>
    <text x="460" y="1128" text-anchor="middle" font-size="9" fill="#F4A261">Varian's</text>
    <text x="460" y="1141" text-anchor="middle" font-size="9" fill="#F4A261">graduate-level</text>
