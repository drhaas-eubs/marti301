<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Varian &amp; Shapiro -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Varian &amp; Shapiro</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">Information Rules — The Strategic Logic of the Network Economy</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">b. 1947 / b. 1955 · UC Berkeley · Information Rules co-authors</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY SHAPIRO, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">Why does the AI economy follow rules first</text>
    <text x="52" y="240" font-size="11.5" fill="#222">described in 1998? Varian &amp; Shapiro wrote</text>
    <text x="52" y="258" font-size="11.5" fill="#222">the timeless playbook on lock-in, network</text>
    <text x="52" y="276" font-size="11.5" fill="#222">effects, switching costs, and bundling —</text>
    <text x="52" y="294" font-size="11.5" fill="#222">exactly the dynamics shaping today's AI</text>
    <text x="52" y="312" font-size="11.5" fill="#222">platform competition for MARTI301 students.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">Hal R. Varian — emeritus professor at UC</text>
    <text x="52" y="428" font-size="11.5" fill="#222">Berkeley (Haas, SIMS, Econ); Chief Economist</text>
    <text x="52" y="446" font-size="11.5" fill="#222">at Google since 2002. Carl Shapiro — Distinguished</text>
    <text x="52" y="464" font-size="11.5" fill="#222">Professor at Berkeley Haas; former Deputy</text>
    <text x="52" y="482" font-size="11.5" fill="#222">Assistant Attorney General (DOJ Antitrust),</text>
    <text x="52" y="500" font-size="11.5" fill="#222">former CEA member. Co-wrote “Information</text>
    <text x="52" y="518" font-size="11.5" fill="#222">Rules” as the dotcom era was peaking.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. Lock-in &amp; Switching Costs</text>
<text x="220" y="610" font-size="10" fill="#222">Raise rivals' acquisition</text>
<text x="220" y="626" font-size="10" fill="#222">cost via path dependence</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. Network Effects</text>
<text x="220" y="646" font-size="10" fill="#222">Positive feedback: value</text>
<text x="220" y="662" font-size="10" fill="#222">scales with the userbase</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Versioning</text>
<text x="220" y="682" font-size="10" fill="#222">Same content, different prices,</text>
<text x="220" y="698" font-size="10" fill="#222">for different willingness-to-pay</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Bundling</text>
<text x="220" y="718" font-size="10" fill="#222">Reduces variance in WTP,</text>
<text x="220" y="734" font-size="10" fill="#222">captures more consumer surplus</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Standards Wars</text>
<text x="220" y="754" font-size="10" fill="#222">When to fight vs cooperate</text>
<text x="220" y="770" font-size="10" fill="#222">(open vs closed regimes)</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Map your customers' switching costs honestly</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Identify network effects (direct + indirect)</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Design versioning across customer segments</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Bundle complements, unbundle substitutes</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Decide: standards war — fight or cooperate?</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Apply same logic to data, model, and API rights</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Technology changes — economic</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">laws don't.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Varian &amp; Shapiro</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Information is costly to</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">produce but cheap to reproduce.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Varian &amp; Shapiro</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• Pre-platform (1998) —</text>
    <text x="455" y="636" font-size="10.5" fill="#222">some examples feel quaint</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Less focus on data as the</text>
    <text x="455" y="668" font-size="10.5" fill="#222">modern lock-in mechanism</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Antitrust framing reflects</text>
    <text x="455" y="700" font-size="10.5" fill="#222">US, pre-DMA / EU AI Act</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• Critics: under-weights</text>
    <text x="455" y="732" font-size="10.5" fill="#222">ecosystem governance</text>
    <text x="442" y="748" font-size="10.5" fill="#222">• GenAI-specific dynamics</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• “Information Rules” still in</text>
    <text x="455" y="844" font-size="10.5" fill="#222">print after 25+ years</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• Standard reference in tech</text>
    <text x="455" y="876" font-size="10.5" fill="#222">strategy &amp; antitrust law</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• Varian's role at Google</text>
    <text x="455" y="908" font-size="10.5" fill="#222">shaped ad-auction theory</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• Shapiro's antitrust work</text>
    <text x="455" y="940" font-size="10.5" fill="#222">shaped DOJ / FTC tech cases</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• Direct ancestor of platform-</text>
    <text x="455" y="972" font-size="10.5" fill="#222">economy thinking (Iansiti et al.)</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
  <g>
    <rect x="80" y="1015" width="120" height="170" fill="#1D2660"/>
    <rect x="84" y="1019" width="112" height="162" fill="none" stroke="#FFD23F" stroke-width="1"/>
    <text x="140" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">INFORMATION</text>
    <text x="140" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">RULES</text>
    <line x1="100" y1="1088" x2="180" y2="1088" stroke="#FFD23F" stroke-width="1"/>
    <text x="140" y="1128" text-anchor="middle" font-size="9" fill="#FFD23F">A Strategic Guide</text>
    <text x="140" y="1141" text-anchor="middle" font-size="9" fill="#FFD23F">to the Network</text>
    <text x="140" y="1154" text-anchor="middle" font-size="9" fill="#FFD23F">Economy</text>
    <text x="140" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">SHAPIRO · 1998</text>
  </g>

  <g>
    <rect x="240" y="1015" width="120" height="170" fill="#7A1F2B"/>
    <rect x="244" y="1019" width="112" height="162" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="300" y="1050" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">INTERMEDIATE</text>
    <text x="300" y="1064" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">MICRO-</text>
    <text x="300" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">ECONOMICS</text>
    <line x1="260" y1="1097" x2="340" y2="1097" stroke="#FFFFFF" stroke-width="1"/>
    <text x="300" y="1128" text-anchor="middle" font-size="9" fill="#FFFFFF">Varian's classic</text>
    <text x="300" y="1141" text-anchor="middle" font-size="9" fill="#FFFFFF">MBA / undergrad</text>
    <text x="300" y="1154" text-anchor="middle" font-size="9" fill="#FFFFFF">textbook (9th ed)</text>
    <text x="300" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">SHAPIRO · 1987</text>
  </g>

  <g>
    <rect x="400" y="1015" width="120" height="170" fill="#264653"/>
    <rect x="404" y="1019" width="112" height="162" fill="none" stroke="#F4A261" stroke-width="1"/>
