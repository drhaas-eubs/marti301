<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Fred Reichheld -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Fred Reichheld</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">Net Promoter Score and the Loyalty Economics of Growth</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">b. 1952 · Bain Fellow · Inventor of Net Promoter Score</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY REICHHELD, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">How do you measure customer loyalty</text>
    <text x="52" y="240" font-size="11.5" fill="#222">in one number — and tie it to growth?</text>
    <text x="52" y="258" font-size="11.5" fill="#222">Reichheld invented Net Promoter Score</text>
    <text x="52" y="276" font-size="11.5" fill="#222">to answer exactly that. His framework</text>
    <text x="52" y="294" font-size="11.5" fill="#222">is now the most widely-used CX metric</text>
    <text x="52" y="312" font-size="11.5" fill="#222">on earth. The number you'll be asked</text>
    <text x="52" y="330" font-size="11.5" fill="#222">to defend in every board meeting.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">Bain Fellow and Founder of Bain's Loyalty</text>
    <text x="52" y="428" font-size="11.5" fill="#222">Practice. Built loyalty economics from</text>
    <text x="52" y="446" font-size="11.5" fill="#222">data on hundreds of firms over decades.</text>
    <text x="52" y="464" font-size="11.5" fill="#222">Drew on Reicheld's earlier work “The</text>
    <text x="52" y="482" font-size="11.5" fill="#222">Loyalty Effect” (1996) — predecessor to</text>
    <text x="52" y="500" font-size="11.5" fill="#222">NPS. Now developing the Earned Growth</text>
    <text x="52" y="518" font-size="11.5" fill="#222">Rate as the next-generation metric.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. Net Promoter Score</text>
<text x="220" y="610" font-size="10" fill="#222">% Promoters - % Detractors</text>
<text x="220" y="626" font-size="10" fill="#222">(0–10 likely-to-recommend)</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. NPS-CSAT-CES Triangle</text>
<text x="220" y="646" font-size="10" fill="#222">Three complementary lenses</text>
<text x="220" y="662" font-size="10" fill="#222">on customer experience</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Loyalty Economics</text>
<text x="220" y="682" font-size="10" fill="#222">Retained customers → referrals</text>
<text x="220" y="698" font-size="10" fill="#222">→ lower CAC → higher margin</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Earned Growth Rate</text>
<text x="220" y="718" font-size="10" fill="#222">% revenue growth from</text>
<text x="220" y="734" font-size="10" fill="#222">existing-customer behaviour</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Promoter / Detractor</text>
<text x="220" y="754" font-size="10" fill="#222">9-10 = Promoter, 7-8 = Passive,</text>
<text x="220" y="770" font-size="10" fill="#222">0-6 = Detractor</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Survey customers with the one NPS question</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Calculate %P - %D — your raw NPS</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Pair with CSAT (satisfaction) and CES (effort)</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Diagnose detractor root causes (close-the-loop)</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Tie NPS to compensation cautiously (Goodhart's Law)</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Track Earned Growth Rate as the financial proof</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Would you recommend us — the</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">one number you need to grow.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Fred Reichheld</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Growth comes from loyalty,</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">not promotions.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Fred Reichheld</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• NPS scale &amp; scoring</text>
    <text x="455" y="636" font-size="10.5" fill="#222">contested by statisticians</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Cultural bias: scoring</text>
    <text x="455" y="668" font-size="10.5" fill="#222">varies by country</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Easy to game when tied</text>
    <text x="455" y="700" font-size="10.5" fill="#222">to incentives</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• Critics: one number hides</text>
    <text x="455" y="732" font-size="10.5" fill="#222">important distinctions</text>
    <text x="442" y="748" font-size="10.5" fill="#222">• “Likely to recommend” ≠</text>
    <text x="455" y="764" font-size="10.5" fill="#222">actual recommendation</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• NPS used by &gt; 2/3 of</text>
    <text x="455" y="844" font-size="10.5" fill="#222">Fortune 1000 firms</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• Bain Loyalty Practice</text>
    <text x="455" y="876" font-size="10.5" fill="#222">&gt; 30 years of growth data</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• “The Ultimate Question”</text>
    <text x="455" y="908" font-size="10.5" fill="#222">reshaped customer-metric</text>
    <text x="455" y="924" font-size="10.5" fill="#222">practice globally</text>
    <text x="442" y="940" font-size="10.5" fill="#222">• Earned Growth Rate now</text>
    <text x="455" y="956" font-size="10.5" fill="#222">in CFO conversations</text>
    <text x="442" y="972" font-size="10.5" fill="#222">• Anchors MARTI301 NPS triangle</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
  <g>
    <rect x="80" y="1015" width="120" height="170" fill="#1D2660"/>
    <rect x="84" y="1019" width="112" height="162" fill="none" stroke="#FFD23F" stroke-width="1"/>
    <text x="140" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">THE LOYALTY</text>
    <text x="140" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">EFFECT</text>
    <line x1="100" y1="1088" x2="180" y2="1088" stroke="#FFD23F" stroke-width="1"/>
    <text x="140" y="1128" text-anchor="middle" font-size="9" fill="#FFD23F">The Hidden Force</text>
    <text x="140" y="1141" text-anchor="middle" font-size="9" fill="#FFD23F">Behind Growth,</text>
    <text x="140" y="1154" text-anchor="middle" font-size="9" fill="#FFD23F">Profits &amp; Value</text>
    <text x="140" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">REICHHELD · 1996</text>
  </g>

  <g>
    <rect x="240" y="1015" width="120" height="170" fill="#7A1F2B"/>
    <rect x="244" y="1019" width="112" height="162" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="300" y="1050" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">THE</text>
    <text x="300" y="1064" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">ULTIMATE</text>
    <text x="300" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">QUESTION</text>
    <line x1="260" y1="1097" x2="340" y2="1097" stroke="#FFFFFF" stroke-width="1"/>
    <text x="300" y="1128" text-anchor="middle" font-size="9" fill="#FFFFFF">Driving Good</text>
    <text x="300" y="1141" text-anchor="middle" font-size="9" fill="#FFFFFF">Profits &amp; True</text>
    <text x="300" y="1154" text-anchor="middle" font-size="9" fill="#FFFFFF">Growth</text>
    <text x="300" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">REICHHELD · 2006</text>
  </g>

  <g>
    <rect x="400" y="1015" width="120" height="170" fill="#264653"/>
    <rect x="404" y="1019" width="112" height="162" fill="none" stroke="#F4A261" stroke-width="1"/>
    <text x="460" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">WINNING ON</text>
    <text x="460" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">PURPOSE</text>
    <line x1="420" y1="1088" x2="500" y2="1088" stroke="#F4A261" stroke-width="1"/>
    <text x="460" y="1128" text-anchor="middle" font-size="9" fill="#F4A261">The Unbeatable</text>
    <text x="460" y="1141" text-anchor="middle" font-size="9" fill="#F4A261">Strategy of</text>
    <text x="460" y="1154" text-anchor="middle" font-size="9" fill="#F4A261">Loving Customers</text>
    <text x="460" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">REICHHELD · 2021</text>
  </g>

  <g>
    <rect x="560" y="1015" width="120" height="170" fill="#0F4C3A"/>
    <rect x="564" y="1019" width="112" height="162" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="620" y="1050" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">THE ONE</text>
    <text x="620" y="1064" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">NUMBER YOU</text>
    <text x="620" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">NEED TO GROW</text>
    <line x1="580" y1="1097" x2="660" y2="1097" stroke="#FFFFFF" stroke-width="1"/>
    <text x="620" y="1135" text-anchor="middle" font-size="9" fill="#FFFFFF">HBR article</text>
