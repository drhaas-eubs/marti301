<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Clayton M. Christensen -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Clayton M. Christensen</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">Disruptive Innovation, Jobs To Be Done, and the AI Frontier</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">1952 – 2020 · Kim B. Clark Professor · Harvard Business School</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY CHRISTENSEN, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">Why do incumbents lose to startups they should</text>
    <text x="52" y="240" font-size="11.5" fill="#222">easily out-compete? Christensen's disruption</text>
    <text x="52" y="258" font-size="11.5" fill="#222">theory predicted today's AI-driven challengers</text>
    <text x="52" y="276" font-size="11.5" fill="#222">— from foundation-model startups to GenAI-</text>
    <text x="52" y="294" font-size="11.5" fill="#222">native services. His Jobs To Be Done lens</text>
    <text x="52" y="312" font-size="11.5" fill="#222">reframes value creation in the era of GenAI.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">DBA, Harvard Business School (1992) after a</text>
    <text x="52" y="428" font-size="11.5" fill="#222">Rhodes Scholarship and a career at CPS</text>
    <text x="52" y="446" font-size="11.5" fill="#222">Technologies. Joined HBS faculty in 1992;</text>
    <text x="52" y="464" font-size="11.5" fill="#222">Kim B. Clark Professor from 1998. Drew on</text>
    <text x="52" y="482" font-size="11.5" fill="#222">evolutionary economics (Nelson &amp; Winter) and</text>
    <text x="52" y="500" font-size="11.5" fill="#222">the technology trajectories work of Foster.</text>
    <text x="52" y="518" font-size="11.5" fill="#222">Co-founded Innosight consultancy in 2000.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. Disruptive Innovation</text>
<text x="220" y="610" font-size="10" fill="#222">Low-end / new-market</text>
<text x="220" y="626" font-size="10" fill="#222">footholds (1997)</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. Sustaining vs Disruptive</text>
<text x="220" y="646" font-size="10" fill="#222">Performance trajectories</text>
<text x="220" y="662" font-size="10" fill="#222">outpace customer needs</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Jobs To Be Done (JTBD)</text>
<text x="220" y="682" font-size="10" fill="#222">Customers “hire” products</text>
<text x="220" y="698" font-size="10" fill="#222">to do a job in their lives</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. RPV Framework</text>
<text x="220" y="718" font-size="10" fill="#222">Resources · Processes · Values</text>
<text x="220" y="734" font-size="10" fill="#222">shape what firms can do</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Capability Trap</text>
<text x="220" y="754" font-size="10" fill="#222">Past success becomes the</text>
<text x="220" y="770" font-size="10" fill="#222">next S-curve's downfall</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Spot low-end / new-market footholds in your sector</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Map customer Jobs To Be Done, not segments</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Audit your RPV — what can you actually deliver?</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Build separate orgs for disruptive bets</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Track GenAI as classic low-end disruption pattern</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Don't milk the dying S-curve — reinvent early</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Disruption isn't an event —</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">it's a process.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Clayton M. Christensen</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Customers don't buy products,</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">they hire them.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Clayton M. Christensen</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• Critics (Lepore, NYT 2014) argue</text>
    <text x="455" y="636" font-size="10.5" fill="#222">cherry-picked case selection</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• “Disruption” term overused — now</text>
    <text x="455" y="668" font-size="10.5" fill="#222">applied to almost any change</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Theory predicts WHAT but weakly</text>
    <text x="455" y="700" font-size="10.5" fill="#222">predicts WHEN</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• Less explanatory power for</text>
    <text x="455" y="732" font-size="10.5" fill="#222">platform / network-effect markets</text>
    <text x="442" y="748" font-size="10.5" fill="#222">• JTBD lacks rigorous research</text>
    <text x="455" y="764" font-size="10.5" fill="#222">methodology guidance</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• Reshaped innovation strategy</text>
    <text x="455" y="844" font-size="10.5" fill="#222">in every B-school globally</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• Innosight &amp; Christensen Institute</text>
    <text x="455" y="876" font-size="10.5" fill="#222">carry his work forward</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• HBR 2025 named Disruptive</text>
    <text x="455" y="908" font-size="10.5" fill="#222">Innovation among 10 best ideas</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• JTBD became a foundational</text>
    <text x="455" y="940" font-size="10.5" fill="#222">product-management lens</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• His “How Will You Measure</text>
    <text x="455" y="972" font-size="10.5" fill="#222">Your Life” — TED + bestseller</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
  <g>
    <rect x="80" y="1015" width="120" height="170" fill="#7A1F2B"/>
    <rect x="84" y="1019" width="112" height="162" fill="none" stroke="#FFD23F" stroke-width="1"/>
    <text x="140" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">THE INNOVATOR'S</text>
    <text x="140" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">DILEMMA</text>
    <line x1="100" y1="1088" x2="180" y2="1088" stroke="#FFD23F" stroke-width="1"/>
    <text x="140" y="1128" text-anchor="middle" font-size="9" fill="#FFD23F">When New Tech</text>
    <text x="140" y="1141" text-anchor="middle" font-size="9" fill="#FFD23F">Causes Great Firms</text>
    <text x="140" y="1154" text-anchor="middle" font-size="9" fill="#FFD23F">to Fail</text>
    <text x="140" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">CHRISTENSEN · 1997</text>
  </g>

  <g>
    <rect x="240" y="1015" width="120" height="170" fill="#0F4C3A"/>
    <rect x="244" y="1019" width="112" height="162" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="300" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">THE INNOVATOR'S</text>
    <text x="300" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">SOLUTION</text>
    <line x1="260" y1="1088" x2="340" y2="1088" stroke="#FFFFFF" stroke-width="1"/>
    <text x="300" y="1128" text-anchor="middle" font-size="9" fill="#FFFFFF">Creating &amp;</text>
    <text x="300" y="1141" text-anchor="middle" font-size="9" fill="#FFFFFF">Sustaining Successful</text>
    <text x="300" y="1154" text-anchor="middle" font-size="9" fill="#FFFFFF">Growth</text>
    <text x="300" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">CHRISTENSEN · 2003</text>
  </g>

  <g>
    <rect x="400" y="1015" width="120" height="170" fill="#1D2660"/>
    <rect x="404" y="1019" width="112" height="162" fill="none" stroke="#FFD23F" stroke-width="1"/>
    <text x="460" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">COMPETING</text>
    <text x="460" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">AGAINST LUCK</text>
    <line x1="420" y1="1088" x2="500" y2="1088" stroke="#FFD23F" stroke-width="1"/>
    <text x="460" y="1128" text-anchor="middle" font-size="9" fill="#FFD23F">The Story of</text>
    <text x="460" y="1141" text-anchor="middle" font-size="9" fill="#FFD23F">Innovation &amp;</text>
    <text x="460" y="1154" text-anchor="middle" font-size="9" fill="#FFD23F">Customer Choice</text>
    <text x="460" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">CHRISTENSEN · 2016</text>
  </g>

  <g>
    <rect x="560" y="1015" width="120" height="170" fill="#264653"/>
    <rect x="564" y="1019" width="112" height="162" fill="none" stroke="#F4A261" stroke-width="1"/>
    <text x="620" y="1050" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">HOW WILL YOU</text>
    <text x="620" y="1064" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">MEASURE</text>
    <text x="620" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">YOUR LIFE?</text>
    <line x1="580" y1="1097" x2="660" y2="1097" stroke="#F4A261" stroke-width="1"/>
