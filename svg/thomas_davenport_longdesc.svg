<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Thomas H. Davenport -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Thomas H. Davenport</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">Competing on Analytics, Working with AI</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">b. 1954 · President's Distinguished Professor · Babson College</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY DAVENPORT, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">How does a firm convert ML capability into</text>
    <text x="52" y="240" font-size="11.5" fill="#222">decision advantage? Davenport translates the</text>
    <text x="52" y="258" font-size="11.5" fill="#222">technical promise of analytics and AI into</text>
    <text x="52" y="276" font-size="11.5" fill="#222">operational playbooks for managers — without</text>
    <text x="52" y="294" font-size="11.5" fill="#222">losing rigour. He is the bridge between data</text>
    <text x="52" y="312" font-size="11.5" fill="#222">scientists and executives in MARTI301.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">PhD Sociology, Harvard (1980). Babson College</text>
    <text x="52" y="428" font-size="11.5" fill="#222">Distinguished Professor since 2007. Co-founder</text>
    <text x="52" y="446" font-size="11.5" fill="#222">of the International Institute for Analytics.</text>
    <text x="52" y="464" font-size="11.5" fill="#222">Fellow, MIT Initiative on the Digital Economy.</text>
    <text x="52" y="482" font-size="11.5" fill="#222">Earlier work on knowledge management with</text>
    <text x="52" y="500" font-size="11.5" fill="#222">Larry Prusak laid the foundation for his</text>
    <text x="52" y="518" font-size="11.5" fill="#222">later analytics and AI books.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. DELTA Plus Model</text>
<text x="220" y="610" font-size="10" fill="#222">Data · Enterprise · Leadership ·</text>
<text x="220" y="626" font-size="10" fill="#222">Targets · Analysts (+ Tech, Skills)</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. 5 Stages of Analytics</text>
<text x="220" y="646" font-size="10" fill="#222">Analytically Impaired →</text>
<text x="220" y="662" font-size="10" fill="#222">Competitor (maturity ladder)</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. AI Capability Pyramid</text>
<text x="220" y="682" font-size="10" fill="#222">Low-hanging fruit →</text>
<text x="220" y="698" font-size="10" fill="#222">transformational use cases</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Augmentation Archetypes</text>
<text x="220" y="718" font-size="10" fill="#222">Step up · Step aside · Step in</text>
<text x="220" y="734" font-size="10" fill="#222">· Step narrowly · Step forward</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. AI Action Framework</text>
<text x="220" y="754" font-size="10" fill="#222">Match AI tech type to</text>
<text x="220" y="770" font-size="10" fill="#222">specific business problem class</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Audit current analytics maturity (DELTA+)</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Identify decisions worth automating vs aiding</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Match AI type (ML / NLP / RPA) to problem</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Build small pilots, measure impact in $</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Scale via centres of excellence + business unit</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Reskill staff using augmentation archetypes</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Companies that compete on</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">analytics outperform their peers.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Thomas H. Davenport</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Don't ignore AI — but don't</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">overdo it either.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Thomas H. Davenport</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• Maturity models can mask</text>
    <text x="455" y="636" font-size="10.5" fill="#222">poor data quality at the base</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• “Augmentation” is harder in</text>
    <text x="455" y="668" font-size="10.5" fill="#222">practice than on paper</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• ROI of analytics often inflated</text>
    <text x="455" y="700" font-size="10.5" fill="#222">by survivorship bias</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• Less coverage of GenAI-specific</text>
    <text x="455" y="732" font-size="10.5" fill="#222">workflow disruption (post-2022)</text>
    <text x="442" y="748" font-size="10.5" fill="#222">• Industry-agnostic frameworks miss</text>
    <text x="455" y="764" font-size="10.5" fill="#222">sector-specific data realities</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• Defined the analytics-as-</text>
    <text x="455" y="844" font-size="10.5" fill="#222">competition discourse since 2006</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• HBR's most-cited author on</text>
    <text x="455" y="876" font-size="10.5" fill="#222">analytics and enterprise AI</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• Influenced enterprise AI strategy</text>
    <text x="455" y="908" font-size="10.5" fill="#222">at &gt;100 Fortune 500 firms</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• “All-In on AI” (2023) framing</text>
    <text x="455" y="940" font-size="10.5" fill="#222">shapes board-level conversations</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• Standard reading in MBA analytics</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
  <g>
    <rect x="80" y="1015" width="120" height="170" fill="#1D2660"/>
    <rect x="84" y="1019" width="112" height="162" fill="none" stroke="#FFD23F" stroke-width="1"/>
    <text x="140" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">COMPETING</text>
    <text x="140" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">ON ANALYTICS</text>
    <line x1="100" y1="1088" x2="180" y2="1088" stroke="#FFD23F" stroke-width="1"/>
    <text x="140" y="1135" text-anchor="middle" font-size="9" fill="#FFD23F">The New Science</text>
    <text x="140" y="1148" text-anchor="middle" font-size="9" fill="#FFD23F">of Winning</text>
    <text x="140" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">DAVENPORT · 2007</text>
  </g>

  <g>
    <rect x="240" y="1015" width="120" height="170" fill="#0B6E4F"/>
    <rect x="244" y="1019" width="112" height="162" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="300" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">BIG DATA</text>
    <text x="300" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">AT WORK</text>
    <line x1="260" y1="1088" x2="340" y2="1088" stroke="#FFFFFF" stroke-width="1"/>
    <text x="300" y="1128" text-anchor="middle" font-size="9" fill="#FFFFFF">Dispelling Myths,</text>
    <text x="300" y="1141" text-anchor="middle" font-size="9" fill="#FFFFFF">Uncovering</text>
    <text x="300" y="1154" text-anchor="middle" font-size="9" fill="#FFFFFF">Opportunities</text>
    <text x="300" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">DAVENPORT · 2014</text>
  </g>

  <g>
    <rect x="400" y="1015" width="120" height="170" fill="#7A1F2B"/>
    <rect x="404" y="1019" width="112" height="162" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="460" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">THE AI</text>
    <text x="460" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">ADVANTAGE</text>
    <line x1="420" y1="1088" x2="500" y2="1088" stroke="#FFFFFF" stroke-width="1"/>
    <text x="460" y="1128" text-anchor="middle" font-size="9" fill="#FFFFFF">How to Put the</text>
    <text x="460" y="1141" text-anchor="middle" font-size="9" fill="#FFFFFF">AI Revolution</text>
    <text x="460" y="1154" text-anchor="middle" font-size="9" fill="#FFFFFF">to Work</text>
    <text x="460" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">DAVENPORT · 2018</text>
  </g>

  <g>
    <rect x="560" y="1015" width="120" height="170" fill="#264653"/>
    <rect x="564" y="1019" width="112" height="162" fill="none" stroke="#F4A261" stroke-width="1"/>
    <text x="620" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">ALL-IN</text>
    <text x="620" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">ON AI</text>
    <line x1="580" y1="1088" x2="660" y2="1088" stroke="#F4A261" stroke-width="1"/>
