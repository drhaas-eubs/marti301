    <text x="620" y="1141" text-anchor="middle" font-size="9" fill="#F4A261">for Disruption</text>
    <text x="620" y="1154" text-anchor="middle" font-size="9" fill="#F4A261">(with Mittal)</text>
    <text x="620" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">DAVENPORT · 2023</text>
  </g>

