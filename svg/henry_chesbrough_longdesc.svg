    <text x="620" y="1128" text-anchor="middle" font-size="9" fill="#FFFFFF">Going Beyond</text>
    <text x="620" y="1141" text-anchor="middle" font-size="9" fill="#FFFFFF">the Hype &amp; Getting</text>
