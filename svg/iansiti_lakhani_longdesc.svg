  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;AI is rewriting the rules of</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">competition.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Iansiti &amp; Lakhani</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Every firm is becoming a</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">software firm.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Iansiti &amp; Lakhani</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• Examples skew toward US tech</text>
    <text x="455" y="636" font-size="10.5" fill="#222">giants (Ant, Microsoft, Amazon)</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Heavy capex / data assumptions</text>
    <text x="455" y="668" font-size="10.5" fill="#222">hard for SME / non-tech firms</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Less coverage of regulatory</text>
    <text x="455" y="700" font-size="10.5" fill="#222">friction in the EU / financial</text>
    <text x="455" y="716" font-size="10.5" fill="#222">services context</text>
    <text x="442" y="732" font-size="10.5" fill="#222">• Critics: “AI Factory” brand</text>
    <text x="455" y="748" font-size="10.5" fill="#222">outpaces the rigour of the model</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• “AI Factory” entered the C-suite</text>
    <text x="455" y="844" font-size="10.5" fill="#222">vocabulary post-2020</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• HBS D^3 Lab a hub for AI-</text>
    <text x="455" y="876" font-size="10.5" fill="#222">business research worldwide</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• Lakhani named one of HBR's</text>
    <text x="455" y="908" font-size="10.5" fill="#222">most influential academics</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• Direct influence on the AI</text>
    <text x="455" y="940" font-size="10.5" fill="#222">strategy chapters of MARTI301</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• Frequent McKinsey, Deloitte,</text>
    <text x="455" y="972" font-size="10.5" fill="#222">WEF speakers on AI strategy</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
