<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Iansiti &amp; Lakhani -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Iansiti &amp; Lakhani</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">The AI Factory and the Architecture of the Modern Digital Firm</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">b. 1959 / b. 1969 · HBS · Co-authors of Competing in the Age of AI</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY LAKHANI, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">What does an AI-native firm actually look</text>
    <text x="52" y="240" font-size="11.5" fill="#222">like? Iansiti &amp; Lakhani give the operating</text>
    <text x="52" y="258" font-size="11.5" fill="#222">model — the AI Factory — that turns data</text>
    <text x="52" y="276" font-size="11.5" fill="#222">into decisions at scale and breaks the</text>
    <text x="52" y="294" font-size="11.5" fill="#222">traditional scale-vs-scope trade-off.</text>
    <text x="52" y="312" font-size="11.5" fill="#222">This is the playbook for AI-era strategy.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">Marco Iansiti: David Sarnoff Professor at HBS,</text>
    <text x="52" y="428" font-size="11.5" fill="#222">founded the Digital Initiative. PhD Physics,</text>
    <text x="52" y="446" font-size="11.5" fill="#222">Harvard. Karim Lakhani: Dorothy &amp; Michael</text>
    <text x="52" y="464" font-size="11.5" fill="#222">Hintze Professor at HBS, founder of D^3 Lab.</text>
    <text x="52" y="482" font-size="11.5" fill="#222">PhD Management of Innovation, MIT Sloan.</text>
    <text x="52" y="500" font-size="11.5" fill="#222">Builds on platform / network-effects research</text>
    <text x="52" y="518" font-size="11.5" fill="#222">and decades of digital transformation cases.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. AI Factory</text>
<text x="220" y="610" font-size="10" fill="#222">Data pipeline + algorithms +</text>
<text x="220" y="626" font-size="10" fill="#222">experimentation as core engine</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. Operating Model Re-design</text>
<text x="220" y="646" font-size="10" fill="#222">From silos to AI-orchestrated</text>
<text x="220" y="662" font-size="10" fill="#222">process flows</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Digital Network Effects</text>
<text x="220" y="682" font-size="10" fill="#222">AI-driven feedback loops as</text>
<text x="220" y="698" font-size="10" fill="#222">moat (data → model → product)</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Collisions vs Hubs</text>
<text x="220" y="718" font-size="10" fill="#222">Where AI-native firms collide</text>
<text x="220" y="734" font-size="10" fill="#222">with traditional industries</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Scale + Scope + Learning</text>
<text x="220" y="754" font-size="10" fill="#222">The 3 forces simultaneously</text>
<text x="220" y="770" font-size="10" fill="#222">unlocked by AI-native firms</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Map your firm's current operating model bottlenecks</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Build the data pipeline before building the algorithm</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Centralise the AI Factory — federate use cases</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Identify which traditional silos must dissolve</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Watch for collisions from AI-native challengers</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Re-engineer governance for algorithmic decisions</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
