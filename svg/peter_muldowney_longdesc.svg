    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Technology and AI have</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">revolutionised information flows.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Peter Muldowney</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;ML cannot replace human</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">judgement — it complements it.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Peter Muldowney</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• Practitioner article (6 pages)</text>
    <text x="455" y="636" font-size="10.5" fill="#222">— not exhaustive treatment</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Limited technical depth on</text>
    <text x="455" y="668" font-size="10.5" fill="#222">specific ML architectures</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Pre-LLM (late 2023) — GenAI</text>
    <text x="455" y="700" font-size="10.5" fill="#222">shifts post-publication</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• Canadian / pension industry</text>
    <text x="455" y="732" font-size="10.5" fill="#222">framing — limited global view</text>
    <text x="442" y="748" font-size="10.5" fill="#222">• No vendor / tool benchmarks</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• Required reading for the</text>
    <text x="455" y="844" font-size="10.5" fill="#222">MARTI301 course</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• Connor, Clark &amp; Lunn</text>
    <text x="455" y="876" font-size="10.5" fill="#222">manages &gt; $100B AUM</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• Pioneer of buy-in annuity</text>
    <text x="455" y="908" font-size="10.5" fill="#222">in the Canadian market</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• IFEBP MTMS faculty —</text>
    <text x="455" y="940" font-size="10.5" fill="#222">educates pension trustees</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• Clear, accessible practitioner</text>
    <text x="455" y="972" font-size="10.5" fill="#222">voice for non-quants</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
