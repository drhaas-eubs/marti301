<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Peter Muldowney -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Peter Muldowney</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">Technology, AI, and the Practitioner View of Investment Management</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">b. ca. 1965 · SVP · Connor, Clark &amp; Lunn Financial Group</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY MULDOWNEY, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">What does AI in investment management</text>
    <text x="52" y="240" font-size="11.5" fill="#222">actually look like from inside the industry?</text>
    <text x="52" y="258" font-size="11.5" fill="#222">Muldowney's article is the required reading</text>
    <text x="52" y="276" font-size="11.5" fill="#222">for MARTI301 Unit 6 — a practitioner's voice</text>
    <text x="52" y="294" font-size="11.5" fill="#222">on data, ML, and the augmentation question.</text>
    <text x="52" y="312" font-size="11.5" fill="#222">The non-academic anchor of this unit.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">25+ years in investment industry across</text>
    <text x="52" y="428" font-size="11.5" fill="#222">Canada, US, UK. Started in consulting; led</text>
    <text x="52" y="446" font-size="11.5" fill="#222">two major Canadian investment consulting</text>
    <text x="52" y="464" font-size="11.5" fill="#222">firms. Pioneered the first buy-in annuity in</text>
    <text x="52" y="482" font-size="11.5" fill="#222">Canada at a major insurer. SVP and Head of</text>
    <text x="52" y="500" font-size="11.5" fill="#222">Institutional &amp; Multi-Asset Strategy at Connor</text>
    <text x="52" y="518" font-size="11.5" fill="#222">Clark &amp; Lunn. IFEBP MTMS faculty member.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. Tech Stack of AI</text>
<text x="220" y="610" font-size="10" fill="#222">AI ⊇ ML ⊇ NLP — clarifying</text>
<text x="220" y="626" font-size="10" fill="#222">the umbrella for managers</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. Fundamental vs Systematic</text>
<text x="220" y="646" font-size="10" fill="#222">Two big styles, both</text>
<text x="220" y="662" font-size="10" fill="#222">transformed by AI differently</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Data Lifecycle</text>
<text x="220" y="682" font-size="10" fill="#222">Sourcing → cleaning →</text>
<text x="220" y="698" font-size="10" fill="#222">validating → signal extraction</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Augment Don't Replace</text>
<text x="220" y="718" font-size="10" fill="#222">Computers + humans as</text>
<text x="220" y="734" font-size="10" fill="#222">complementary roles in IM</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Known Unknowns</text>
<text x="220" y="754" font-size="10" fill="#222">AI disruption likely</text>
<text x="220" y="770" font-size="10" fill="#222">(“Blockbuster moment” analogy)</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Define your investment style — fundamental or systematic</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Audit data sources for coverage + reliability</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Apply ML for non-linear pattern detection</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Use NLP for unstructured text signal extraction</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Keep humans in the loop for judgement calls</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Add AI as a quarterly committee discussion item</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
