<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Andrew W. Lo -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Andrew W. Lo</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">Adaptive Markets — Where Behavioural Finance Meets Machine Learning</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">b. 1960 · Charles E. and Susan T. Harris Professor · MIT Sloan</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY LO, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">Are markets efficient or irrational? Lo says:</text>
    <text x="52" y="240" font-size="11.5" fill="#222">neither — they're adaptive. His work bridges</text>
    <text x="52" y="258" font-size="11.5" fill="#222">the rational-actor school and behavioural</text>
    <text x="52" y="276" font-size="11.5" fill="#222">finance, and gives MARTI301 students the</text>
    <text x="52" y="294" font-size="11.5" fill="#222">framework to think about how AI itself</text>
    <text x="52" y="312" font-size="11.5" fill="#222">becomes a force in evolving market dynamics.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">PhD Economics, Harvard (1984). Charles E.</text>
    <text x="52" y="428" font-size="11.5" fill="#222">and Susan T. Harris Professor at MIT Sloan,</text>
    <text x="52" y="446" font-size="11.5" fill="#222">Director of the MIT Laboratory for Financial</text>
    <text x="52" y="464" font-size="11.5" fill="#222">Engineering. Founded AlphaSimplex Group</text>
    <text x="52" y="482" font-size="11.5" fill="#222">(quant hedge fund). Influenced by Samuelson,</text>
    <text x="52" y="500" font-size="11.5" fill="#222">Mandelbrot, evolutionary biology, complex</text>
    <text x="52" y="518" font-size="11.5" fill="#222">systems theory. NBER affiliate.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. Adaptive Markets Hypothesis</text>
<text x="220" y="610" font-size="10" fill="#222">Markets evolve like ecosystems —</text>
<text x="220" y="626" font-size="10" fill="#222">neither efficient nor irrational</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. Variance-Based Risk</text>
<text x="220" y="646" font-size="10" fill="#222">Connecting Sharpe ratios</text>
<text x="220" y="662" font-size="10" fill="#222">to evolutionary fitness</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Healthcare Megafund</text>
<text x="220" y="682" font-size="10" fill="#222">Pooling biotech bets to</text>
<text x="220" y="698" font-size="10" fill="#222">lower portfolio risk (2012)</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. AI as Market Force</text>
<text x="220" y="718" font-size="10" fill="#222">When ML traders themselves</text>
<text x="220" y="734" font-size="10" fill="#222">shape market dynamics</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Risk Tolerance Survey</text>
<text x="220" y="754" font-size="10" fill="#222">Empirical measurement of</text>
<text x="220" y="770" font-size="10" fill="#222">investor risk preferences</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Test EMH assumptions in your asset class</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Map market participants as evolutionary niches</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Model regime change — behaviour adapts to environment</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Stress-test assuming AI traders themselves shift markets</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Use quant + behavioural lenses together (not either/or)</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Build measurement of investor preferences into design</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Markets are neither efficient</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">nor irrational — they're adaptive.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Andrew W. Lo</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Risk doesn't change as a</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">function of preferences.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Andrew W. Lo</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• AMH is more meta-framework</text>
    <text x="455" y="636" font-size="10.5" fill="#222">than testable hypothesis</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Less actionable than Kahneman</text>
    <text x="455" y="668" font-size="10.5" fill="#222">for individual decisions</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Megafund concept hasn't yet</text>
    <text x="455" y="700" font-size="10.5" fill="#222">scaled in biotech (early days)</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• Critics: sometimes blurs</text>
    <text x="455" y="732" font-size="10.5" fill="#222">description and prescription</text>
    <text x="442" y="748" font-size="10.5" fill="#222">• Limited GenAI / LLM coverage</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• Reconciled EMH and behavioural</text>
    <text x="455" y="844" font-size="10.5" fill="#222">finance for a generation of MBAs</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• AlphaSimplex acquired by</text>
    <text x="455" y="876" font-size="10.5" fill="#222">Natixis IM (2022)</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• “Adaptive Markets” named</text>
    <text x="455" y="908" font-size="10.5" fill="#222">one of FT's best business books</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• MIT LFE major research hub</text>
    <text x="455" y="940" font-size="10.5" fill="#222">for AI in finance</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• Direct influence on López</text>
    <text x="455" y="972" font-size="10.5" fill="#222">de Prado and the ML-finance set</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
