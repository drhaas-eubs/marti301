    <text x="140" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">MARKETS</text>
    <line x1="100" y1="1088" x2="180" y2="1088" stroke="#FFD23F" stroke-width="1"/>
    <text x="140" y="1128" text-anchor="middle" font-size="9" fill="#FFD23F">Financial Evolution</text>
    <text x="140" y="1141" text-anchor="middle" font-size="9" fill="#FFD23F">at the Speed</text>
    <text x="140" y="1154" text-anchor="middle" font-size="9" fill="#FFD23F">of Thought</text>
    <text x="140" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">LO · 2017</text>
  </g>

  <g>
    <rect x="240" y="1015" width="120" height="170" fill="#7A1F2B"/>
