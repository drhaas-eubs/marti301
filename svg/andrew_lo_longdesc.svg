    <line x1="260" y1="1097" x2="340" y2="1097" stroke="#FFFFFF" stroke-width="1"/>
    <text x="300" y="1135" text-anchor="middle" font-size="9" fill="#FFFFFF">with A. Craig</text>
    <text x="300" y="1148" text-anchor="middle" font-size="9" fill="#FFFFFF">MacKinlay</text>
    <text x="300" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">LO · 1999</text>
  </g>

  <g>
    <rect x="400" y="1015" width="120" height="170" fill="#264653"/>
    <rect x="404" y="1019" width="112" height="162" fill="none" stroke="#F4A261" stroke-width="1"/>
