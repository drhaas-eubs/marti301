    <text x="140" y="1064" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">INNOVATOR'S</text>
    <text x="140" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">DILEMMA</text>
    <line x1="100" y1="1097" x2="180" y2="1097" stroke="#E63946" stroke-width="1"/>
    <text x="140" y="1128" text-anchor="middle" font-size="9" fill="#E63946">When New</text>
    <text x="140" y="1141" text-anchor="middle" font-size="9" fill="#E63946">Technologies Cause</text>
    <text x="140" y="1154" text-anchor="middle" font-size="9" fill="#E63946">Great Firms to Fail</text>
    <text x="140" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">CHRISTENSEN · 1997</text>
  </g>

  <g>
    <rect x="240" y="1015" width="120" height="170" fill="#1D2660"/>
    <rect x="244" y="1019" width="112" height="162" fill="none" stroke="#FFD23F" stroke-width="1"/>
    <text x="300" y="1050" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">THE</text>
    <text x="300" y="1064" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">INNOVATOR'S</text>
    <text x="300" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">SOLUTION</text>
    <line x1="260" y1="1097" x2="340" y2="1097" stroke="#FFD23F" stroke-width="1"/>
    <text x="300" y="1128" text-anchor="middle" font-size="9" fill="#FFD23F">Creating &amp;</text>
    <text x="300" y="1141" text-anchor="middle" font-size="9" fill="#FFD23F">Sustaining</text>
    <text x="300" y="1154" text-anchor="middle" font-size="9" fill="#FFD23F">Successful Growth</text>
    <text x="300" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">CHRISTENSEN · 2003</text>
  </g>

  <g>
    <rect x="400" y="1015" width="120" height="170" fill="#7A1F2B"/>
    <rect x="404" y="1019" width="112" height="162" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="460" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">COMPETING</text>
    <text x="460" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">AGAINST LUCK</text>
    <line x1="420" y1="1088" x2="500" y2="1088" stroke="#FFFFFF" stroke-width="1"/>
    <text x="460" y="1128" text-anchor="middle" font-size="9" fill="#FFFFFF">The Story of</text>
    <text x="460" y="1141" text-anchor="middle" font-size="9" fill="#FFFFFF">Innovation &amp;</text>
    <text x="460" y="1154" text-anchor="middle" font-size="9" fill="#FFFFFF">Customer Choice</text>
    <text x="460" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">CHRISTENSEN · 2016</text>
  </g>

  <g>
    <rect x="560" y="1015" width="120" height="170" fill="#0F4C3A"/>
