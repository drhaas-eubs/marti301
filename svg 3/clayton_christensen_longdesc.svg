<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Clayton M. Christensen -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Clayton M. Christensen</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">Disruptive Innovation, Jobs To Be Done, and the S-Curve</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">1952 – 2020 · Kim B. Clark Professor of Business Administration · HBS</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY CHRISTENSEN, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">Why do incumbents lose to startups they</text>
    <text x="52" y="240" font-size="11.5" fill="#222">should easily out-compete — and how do</text>
    <text x="52" y="258" font-size="11.5" fill="#222">you avoid that fate? Christensen's</text>
    <text x="52" y="276" font-size="11.5" fill="#222">disruption theory predicted today's</text>
    <text x="52" y="294" font-size="11.5" fill="#222">AI-driven challengers — from foundation-</text>
    <text x="52" y="312" font-size="11.5" fill="#222">model startups to GenAI-native services.</text>
    <text x="52" y="330" font-size="11.5" fill="#222">Reframes the value you create.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">PhD Business Administration, HBS (1992).</text>
    <text x="52" y="428" font-size="11.5" fill="#222">Kim B. Clark Professor at HBS for 27 years.</text>
    <text x="52" y="446" font-size="11.5" fill="#222">Co-founded Innosight consultancy. Built on</text>
    <text x="52" y="464" font-size="11.5" fill="#222">Schumpeter's creative destruction and</text>
    <text x="52" y="482" font-size="11.5" fill="#222">Foster's S-curve work. His theory came</text>
    <text x="52" y="500" font-size="11.5" fill="#222">from observing the disk drive industry —</text>
    <text x="52" y="518" font-size="11.5" fill="#222">and predicted personal computing perfectly.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. Disruption S-Curves</text>
<text x="220" y="610" font-size="10" fill="#222">Incumbent vs entrant</text>
<text x="220" y="626" font-size="10" fill="#222">performance trajectories</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. Disruptive Innovation</text>
<text x="220" y="646" font-size="10" fill="#222">Low-end / new-market</text>
<text x="220" y="662" font-size="10" fill="#222">disruption typology</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Jobs To Be Done</text>
<text x="220" y="682" font-size="10" fill="#222">Customers hire products to</text>
<text x="220" y="698" font-size="10" fill="#222">do a job in a context</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Innovator's Dilemma</text>
<text x="220" y="718" font-size="10" fill="#222">Doing the right thing</text>
<text x="220" y="734" font-size="10" fill="#222">by current customers kills you</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Sustaining vs Disrupt</text>
<text x="220" y="754" font-size="10" fill="#222">Margins reward sustaining;</text>
<text x="220" y="770" font-size="10" fill="#222">growth comes from disrupting</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Map your incumbent S-curve performance</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Scan for low-end and new-market entrants</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Define the “job” your product is hired to do</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Test if AI changes job requirements</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Spawn a separate org to disrupt yourself</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Set different metrics for the disruptor unit</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Disruption isn't an event —</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">it's a process.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Clayton M. Christensen</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Customers don't buy products,</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">they hire them.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Clayton M. Christensen</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• “Disruption” became a buzzword,</text>
    <text x="455" y="636" font-size="10.5" fill="#222">losing precision</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Lepore (2014): theory's</text>
    <text x="455" y="668" font-size="10.5" fill="#222">examples cherry-picked</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Less precise on timing of</text>
    <text x="455" y="700" font-size="10.5" fill="#222">disruption (when?)</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• Doesn't predict which entrant</text>
    <text x="455" y="732" font-size="10.5" fill="#222">wins — only that one does</text>
    <text x="442" y="748" font-size="10.5" fill="#222">• Limited treatment of network</text>
    <text x="455" y="764" font-size="10.5" fill="#222">effects / platform economics</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• Most influential business</text>
    <text x="455" y="844" font-size="10.5" fill="#222">theorist of past 30 years</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• “Innovator's Dilemma” &gt; 5M</text>
    <text x="455" y="876" font-size="10.5" fill="#222">copies sold globally</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• JTBD reshaped product-</text>
    <text x="455" y="908" font-size="10.5" fill="#222">management practice</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• Foundation for every</text>
    <text x="455" y="940" font-size="10.5" fill="#222">AI / GenAI startup pitch</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• Innosight advises Fortune</text>
    <text x="455" y="972" font-size="10.5" fill="#222">500 on disruptive growth</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
