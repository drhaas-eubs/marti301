<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Fama &amp; French -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Fama &amp; French</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">Multi-Factor Asset Pricing and the Cross-Section of Returns</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">b. 1939 / b. 1954 · Chicago Booth · Tuck Dartmouth · Nobel 2013</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY FRENCH, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">Why does a single market factor fail</text>
    <text x="52" y="240" font-size="11.5" fill="#222">to explain why some stocks outperform?</text>
    <text x="52" y="258" font-size="11.5" fill="#222">Fama and French answered with the</text>
    <text x="52" y="276" font-size="11.5" fill="#222">three-factor model (1992) and later five-</text>
    <text x="52" y="294" font-size="11.5" fill="#222">factor (2015) — the basis of every smart-</text>
    <text x="52" y="312" font-size="11.5" fill="#222">beta and AI-driven factor strategy you'll</text>
    <text x="52" y="330" font-size="11.5" fill="#222">encounter in modern investment management.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">Eugene Fama — Robert R. McCormick Professor</text>
    <text x="52" y="428" font-size="11.5" fill="#222">at Chicago Booth since 1963. Nobel 2013</text>
    <text x="52" y="446" font-size="11.5" fill="#222">(with Hansen, Shiller). Coined the Efficient</text>
    <text x="52" y="464" font-size="11.5" fill="#222">Markets Hypothesis (1970).</text>
    <text x="52" y="482" font-size="11.5" fill="#222">Kenneth French — Roth Family Distinguished</text>
    <text x="52" y="500" font-size="11.5" fill="#222">Professor at Tuck School, Dartmouth.</text>
    <text x="52" y="518" font-size="11.5" fill="#222">PhD Rochester. Long-time Fama collaborator.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. Three-Factor Model (1992)</text>
<text x="220" y="610" font-size="10" fill="#222">Market + SMB (size)</text>
<text x="220" y="626" font-size="10" fill="#222">+ HML (value)</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. Five-Factor Model (2015)</text>
<text x="220" y="646" font-size="10" fill="#222">+ RMW (profitability) +</text>
<text x="220" y="662" font-size="10" fill="#222">CMA (investment)</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. SMB · HML · RMW · CMA</text>
<text x="220" y="682" font-size="10" fill="#222">Small-minus-big · high-minus-</text>
<text x="220" y="698" font-size="10" fill="#222">low BE/ME · robust-minus-weak...</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Cross-Section of Returns</text>
<text x="220" y="718" font-size="10" fill="#222">Why do stocks earn what they</text>
<text x="220" y="734" font-size="10" fill="#222">earn? — 1992 paper answer</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Efficient Markets (1970)</text>
<text x="220" y="754" font-size="10" fill="#222">Weak / semi-strong / strong</text>
<text x="220" y="770" font-size="10" fill="#222">form market efficiency</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Decide on factor set (3 or 5 factors, or more)</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Estimate factor loadings for your portfolio</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Decompose returns into factor + idiosyncratic</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Tilt portfolio toward desired factors</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Rebalance when factor exposures drift</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Use ML to detect new factors — cautiously</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Markets are largely efficient</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">— but factors explain returns.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Fama &amp; French</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Beta is dead. Long live the</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">factors.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Fama &amp; French</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• Factor zoo problem: &gt; 400</text>
    <text x="455" y="636" font-size="10.5" fill="#222">proposed factors in literature</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Many factors don't survive</text>
    <text x="455" y="668" font-size="10.5" fill="#222">out-of-sample testing</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Critics (Asness, Lopez de</text>
    <text x="455" y="700" font-size="10.5" fill="#222">Prado): p-hacked discoveries</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• EMH challenged by behavioural</text>
    <text x="455" y="732" font-size="10.5" fill="#222">finance and recent anomalies</text>
    <text x="442" y="748" font-size="10.5" fill="#222">• Doesn't predict crisis</text>
    <text x="455" y="764" font-size="10.5" fill="#222">regime shifts</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• Foundation of factor / smart-</text>
    <text x="455" y="844" font-size="10.5" fill="#222">beta industry (~$1T AUM)</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• Fama Nobel 2013 cemented</text>
    <text x="455" y="876" font-size="10.5" fill="#222">the academic case</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• Kenneth French data library</text>
    <text x="455" y="908" font-size="10.5" fill="#222">the standard quant reference</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• Inspires every ML factor</text>
    <text x="455" y="940" font-size="10.5" fill="#222">research project (incl. Lopez)</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• Direct anchor for MARTI301</text>
    <text x="455" y="972" font-size="10.5" fill="#222">Unit 6 Factor Investing</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
