    <text x="300" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">FRENCH · 2015</text>
  </g>

  <g>
    <rect x="400" y="1015" width="120" height="170" fill="#264653"/>
    <rect x="404" y="1019" width="112" height="162" fill="none" stroke="#F4A261" stroke-width="1"/>
    <text x="460" y="1050" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">EFFICIENT</text>
