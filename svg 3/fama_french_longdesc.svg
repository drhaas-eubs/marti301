    <rect x="80" y="1015" width="120" height="170" fill="#1D2660"/>
    <rect x="84" y="1019" width="112" height="162" fill="none" stroke="#FFD23F" stroke-width="1"/>
    <text x="140" y="1050" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">THE CROSS-</text>
    <text x="140" y="1064" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">SECTION OF</text>
    <text x="140" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">EXPECTED</text>
    <text x="140" y="1092" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">STOCK RETURNS</text>
    <line x1="100" y1="1111" x2="180" y2="1111" stroke="#FFD23F" stroke-width="1"/>
    <text x="140" y="1135" text-anchor="middle" font-size="9" fill="#FFD23F">Journal of</text>
    <text x="140" y="1148" text-anchor="middle" font-size="9" fill="#FFD23F">Finance (1992)</text>
    <text x="140" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">FRENCH · 1992</text>
  </g>

  <g>
    <rect x="240" y="1015" width="120" height="170" fill="#7A1F2B"/>
    <rect x="244" y="1019" width="112" height="162" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="300" y="1050" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">A FIVE-</text>
    <text x="300" y="1064" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">FACTOR ASSET</text>
    <text x="300" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">PRICING MODEL</text>
    <line x1="260" y1="1097" x2="340" y2="1097" stroke="#FFFFFF" stroke-width="1"/>
    <text x="300" y="1128" text-anchor="middle" font-size="9" fill="#FFFFFF">Journal of</text>
