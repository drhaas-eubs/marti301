<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · John Boyd -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">John Boyd</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">The OODA Loop and the Speed of Decision Advantage</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">1927 – 1997 · USAF Colonel · Fighter Pilot · Strategist</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY BOYD, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">How fast does your firm actually decide</text>
    <text x="52" y="240" font-size="11.5" fill="#222">compared to the competition? Boyd built</text>
    <text x="52" y="258" font-size="11.5" fill="#222">the framework you'll use to find out:</text>
    <text x="52" y="276" font-size="11.5" fill="#222">the OODA Loop. Originally for fighter</text>
    <text x="52" y="294" font-size="11.5" fill="#222">pilots, now the gold-standard model for</text>
    <text x="52" y="312" font-size="11.5" fill="#222">any decision contest where speed of</text>
    <text x="52" y="330" font-size="11.5" fill="#222">iteration is the source of advantage.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">USAF Colonel, F-86 Sabre pilot in Korea.</text>
    <text x="52" y="428" font-size="11.5" fill="#222">Created Energy-Maneuverability theory at</text>
    <text x="52" y="446" font-size="11.5" fill="#222">Eglin AFB, redesigning fighter aircraft.</text>
    <text x="52" y="464" font-size="11.5" fill="#222">Influenced Marine Corps doctrine, the</text>
    <text x="52" y="482" font-size="11.5" fill="#222">Toyota Production System, and Silicon</text>
    <text x="52" y="500" font-size="11.5" fill="#222">Valley product cycles. Never wrote a book</text>
    <text x="52" y="518" font-size="11.5" fill="#222">— taught through 13-hour briefings.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. OODA Loop</text>
<text x="220" y="610" font-size="10" fill="#222">Observe → Orient → Decide →</text>
<text x="220" y="626" font-size="10" fill="#222">Act (then iterate)</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. Tempo Advantage</text>
<text x="220" y="646" font-size="10" fill="#222">Cycle faster than your</text>
<text x="220" y="662" font-size="10" fill="#222">competitor / adversary</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Disrupt Their OODA</text>
<text x="220" y="682" font-size="10" fill="#222">Inject ambiguity to slow</text>
<text x="220" y="698" font-size="10" fill="#222">the opponent's cycle</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Patterns of Conflict</text>
<text x="220" y="718" font-size="10" fill="#222">1986 briefing on warfare</text>
<text x="220" y="734" font-size="10" fill="#222">and competitive dynamics</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Energy-Maneuverability</text>
<text x="220" y="754" font-size="10" fill="#222">Performance envelope theory</text>
<text x="220" y="770" font-size="10" fill="#222">for any system</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Map your firm's current Observe-Orient-Decide-Act cycle</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Time each phase honestly — find the bottleneck</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Use AI to compress Observe and Orient most of all</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Maintain human judgement at Decide and Act</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Iterate faster than the competitor's full cycle</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Inject noise / decoys to slow rivals' OODA</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Whoever cycles fastest gains</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">the advantage.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— John Boyd</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Machines don't fight wars —</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">minds do.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— John Boyd</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• “Orient” phase often</text>
    <text x="455" y="636" font-size="10.5" fill="#222">underspecified by users</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Speed without quality →</text>
    <text x="455" y="668" font-size="10.5" fill="#222">faster wrong decisions</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Originally for combat —</text>
    <text x="455" y="700" font-size="10.5" fill="#222">business contexts differ</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• Boyd left no canonical text;</text>
    <text x="455" y="732" font-size="10.5" fill="#222">followers reconstruct intent</text>
    <text x="442" y="748" font-size="10.5" fill="#222">• Critics: OODA is more</text>
    <text x="455" y="764" font-size="10.5" fill="#222">meta-framework than tool</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• OODA standard vocabulary</text>
    <text x="455" y="844" font-size="10.5" fill="#222">in the US military</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• Reframed startup and product</text>
    <text x="455" y="876" font-size="10.5" fill="#222">cycles (Lean Startup roots)</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• Coram's biography (2002) a</text>
    <text x="455" y="908" font-size="10.5" fill="#222">bestseller in tech / strategy</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• Osinga's “Science, Strategy</text>
    <text x="455" y="940" font-size="10.5" fill="#222">and War” (2007) the academic</text>
    <text x="455" y="956" font-size="10.5" fill="#222">treatment</text>
    <text x="442" y="972" font-size="10.5" fill="#222">• Direct anchor for MARTI301</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
  <g>
    <rect x="80" y="1015" width="120" height="170" fill="#1A1A1A"/>
    <rect x="84" y="1019" width="112" height="162" fill="none" stroke="#E63946" stroke-width="1"/>
    <text x="140" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">BOYD</text>
    <line x1="100" y1="1074" x2="180" y2="1074" stroke="#E63946" stroke-width="1"/>
    <text x="140" y="1128" text-anchor="middle" font-size="9" fill="#E63946">The Fighter Pilot</text>
    <text x="140" y="1141" text-anchor="middle" font-size="9" fill="#E63946">Who Changed the</text>
    <text x="140" y="1154" text-anchor="middle" font-size="9" fill="#E63946">Art of War</text>
    <text x="140" y="1167" text-anchor="middle" font-size="9" fill="#E63946">(Coram, 2002)</text>
    <text x="140" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">BOYD · 2002</text>
  </g>

  <g>
    <rect x="240" y="1015" width="120" height="170" fill="#1D2660"/>
    <rect x="244" y="1019" width="112" height="162" fill="none" stroke="#FFD23F" stroke-width="1"/>
    <text x="300" y="1050" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">SCIENCE,</text>
    <text x="300" y="1064" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">STRATEGY</text>
    <text x="300" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">AND WAR</text>
    <line x1="260" y1="1097" x2="340" y2="1097" stroke="#FFD23F" stroke-width="1"/>
    <text x="300" y="1128" text-anchor="middle" font-size="9" fill="#FFD23F">Frans Osinga's</text>
    <text x="300" y="1141" text-anchor="middle" font-size="9" fill="#FFD23F">academic study</text>
    <text x="300" y="1154" text-anchor="middle" font-size="9" fill="#FFD23F">of Boyd</text>
    <text x="300" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">BOYD · 2007</text>
  </g>

  <g>
    <rect x="400" y="1015" width="120" height="170" fill="#7A1F2B"/>
    <rect x="404" y="1019" width="112" height="162" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="460" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">PATTERNS</text>
    <text x="460" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">OF CONFLICT</text>
    <line x1="420" y1="1088" x2="500" y2="1088" stroke="#FFFFFF" stroke-width="1"/>
    <text x="460" y="1128" text-anchor="middle" font-size="9" fill="#FFFFFF">Boyd's 1986</text>
    <text x="460" y="1141" text-anchor="middle" font-size="9" fill="#FFFFFF">briefing slides</text>
    <text x="460" y="1154" text-anchor="middle" font-size="9" fill="#FFFFFF">(reconstructed)</text>
    <text x="460" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">BOYD · 1986</text>
  </g>

  <g>
    <rect x="560" y="1015" width="120" height="170" fill="#0F4C3A"/>
    <rect x="564" y="1019" width="112" height="162" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="620" y="1050" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">A DISCOURSE</text>
    <text x="620" y="1064" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">ON WINNING</text>
    <text x="620" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">&amp; LOSING</text>
    <line x1="580" y1="1097" x2="660" y2="1097" stroke="#FFFFFF" stroke-width="1"/>
    <text x="620" y="1135" text-anchor="middle" font-size="9" fill="#FFFFFF">Compiled essays</text>
    <text x="620" y="1148" text-anchor="middle" font-size="9" fill="#FFFFFF">and briefings</text>
    <text x="620" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">BOYD · 1987</text>
  </g>

