<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Harry Markowitz -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Harry Markowitz</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">Modern Portfolio Theory and the Mathematics of Diversification</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">1927 – 2023 · Nobel Laureate Economics 1990 · Father of MPT</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY MARKOWITZ, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">How do you actually combine assets to</text>
    <text x="52" y="240" font-size="11.5" fill="#222">get the highest return for a given risk?</text>
    <text x="52" y="258" font-size="11.5" fill="#222">Markowitz answered in 1952 with the</text>
    <text x="52" y="276" font-size="11.5" fill="#222">math your AI portfolio engine still</text>
    <text x="52" y="294" font-size="11.5" fill="#222">runs on today: Modern Portfolio Theory</text>
    <text x="52" y="312" font-size="11.5" fill="#222">and the Efficient Frontier. The bedrock</text>
    <text x="52" y="330" font-size="11.5" fill="#222">of every quant model you'll touch.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">PhD Chicago (1955), under Friedman, Marschak.</text>
    <text x="52" y="428" font-size="11.5" fill="#222">RAND Corporation alumnus. Nobel Memorial</text>
    <text x="52" y="446" font-size="11.5" fill="#222">Prize in Economics, 1990 (with Sharpe &amp; Miller).</text>
    <text x="52" y="464" font-size="11.5" fill="#222">1952 paper “Portfolio Selection” (J. of Finance)</text>
    <text x="52" y="482" font-size="11.5" fill="#222">single-handedly created modern asset</text>
    <text x="52" y="500" font-size="11.5" fill="#222">management. Simulated his own retirement</text>
    <text x="52" y="518" font-size="11.5" fill="#222">portfolio with 50/50 stocks/bonds.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. Modern Portfolio Theory</text>
<text x="220" y="610" font-size="10" fill="#222">Mean-variance optimisation</text>
<text x="220" y="626" font-size="10" fill="#222">across assets</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. Efficient Frontier</text>
<text x="220" y="646" font-size="10" fill="#222">Risk × return curve of</text>
<text x="220" y="662" font-size="10" fill="#222">optimal portfolios</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Mean-Variance Optim.</text>
<text x="220" y="682" font-size="10" fill="#222">Maximise return / minimise</text>
<text x="220" y="698" font-size="10" fill="#222">variance under constraints</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Diversification Math</text>
<text x="220" y="718" font-size="10" fill="#222">Correlation &lt; 1 → risk falls</text>
<text x="220" y="734" font-size="10" fill="#222">without sacrificing return</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Capital Market Line</text>
<text x="220" y="754" font-size="10" fill="#222">Risk-free + market</text>
<text x="220" y="770" font-size="10" fill="#222">tangent portfolio</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Build the covariance matrix of candidate assets</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Compute expected returns (the hard part)</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Solve the optimisation → efficient frontier</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Pick a point matching your risk tolerance</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Test stability under input perturbation</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Use AI to refine inputs, not replace the framework</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Diversification is the only</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">free lunch in finance.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Harry Markowitz</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Don't put all your eggs in</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">one basket — and know exactly why.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Harry Markowitz</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• Sensitive to estimation error</text>
    <text x="455" y="636" font-size="10.5" fill="#222">in expected returns</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Assumes Gaussian returns</text>
    <text x="455" y="668" font-size="10.5" fill="#222">— Taleb's fat-tail critique</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Single-period model;</text>
    <text x="455" y="700" font-size="10.5" fill="#222">reality is multi-period</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• Garbage-in / garbage-out:</text>
    <text x="455" y="732" font-size="10.5" fill="#222">weights swing wildly with inputs</text>
    <text x="442" y="748" font-size="10.5" fill="#222">• Inspired Black-Litterman</text>
    <text x="455" y="764" font-size="10.5" fill="#222">precisely to fix these issues</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• 1952 paper still the most</text>
    <text x="455" y="844" font-size="10.5" fill="#222">cited in finance</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• Foundation of every robo-</text>
    <text x="455" y="876" font-size="10.5" fill="#222">advisor algorithm</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• Won Nobel Prize 38 years</text>
    <text x="455" y="908" font-size="10.5" fill="#222">after his Chicago dissertation</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• MPT vocabulary — Sharpe,</text>
    <text x="455" y="940" font-size="10.5" fill="#222">alpha, beta — came after</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• Direct anchor for MARTI301</text>
    <text x="455" y="972" font-size="10.5" fill="#222">Unit 6 Efficient Frontier</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
  <g>
    <rect x="80" y="1015" width="120" height="170" fill="#1D2660"/>
    <rect x="84" y="1019" width="112" height="162" fill="none" stroke="#FFD23F" stroke-width="1"/>
    <text x="140" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">PORTFOLIO</text>
    <text x="140" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">SELECTION</text>
    <line x1="100" y1="1088" x2="180" y2="1088" stroke="#FFD23F" stroke-width="1"/>
    <text x="140" y="1128" text-anchor="middle" font-size="9" fill="#FFD23F">Efficient</text>
    <text x="140" y="1141" text-anchor="middle" font-size="9" fill="#FFD23F">Diversification of</text>
    <text x="140" y="1154" text-anchor="middle" font-size="9" fill="#FFD23F">Investments</text>
    <text x="140" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">MARKOWITZ · 1959</text>
  </g>

  <g>
    <rect x="240" y="1015" width="120" height="170" fill="#7A1F2B"/>
    <rect x="244" y="1019" width="112" height="162" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="300" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">PORTFOLIO</text>
    <text x="300" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">SELECTION</text>
    <line x1="260" y1="1088" x2="340" y2="1088" stroke="#FFFFFF" stroke-width="1"/>
    <text x="300" y="1128" text-anchor="middle" font-size="9" fill="#FFFFFF">Original 1952</text>
    <text x="300" y="1141" text-anchor="middle" font-size="9" fill="#FFFFFF">Journal of</text>
    <text x="300" y="1154" text-anchor="middle" font-size="9" fill="#FFFFFF">Finance paper</text>
    <text x="300" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">MARKOWITZ · 1952</text>
  </g>

  <g>
    <rect x="400" y="1015" width="120" height="170" fill="#264653"/>
    <rect x="404" y="1019" width="112" height="162" fill="none" stroke="#F4A261" stroke-width="1"/>
    <text x="460" y="1050" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">MEAN-</text>
    <text x="460" y="1064" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">VARIANCE</text>
    <text x="460" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">ANALYSIS</text>
    <line x1="420" y1="1097" x2="500" y2="1097" stroke="#F4A261" stroke-width="1"/>
    <text x="460" y="1128" text-anchor="middle" font-size="9" fill="#F4A261">in Portfolio</text>
    <text x="460" y="1141" text-anchor="middle" font-size="9" fill="#F4A261">Choice &amp; Capital</text>
    <text x="460" y="1154" text-anchor="middle" font-size="9" fill="#F4A261">Markets</text>
    <text x="460" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">MARKOWITZ · 1987</text>
  </g>

  <g>
    <rect x="560" y="1015" width="120" height="170" fill="#0F4C3A"/>
