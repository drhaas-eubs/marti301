<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Philip Kotler -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Philip Kotler</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">From the 4 Ps to Marketing 6.0 — The Immersive CX Era</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">b. 1931 · Father of Modern Marketing · Kellogg School</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY KOTLER, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">How does your marketing thinking need to</text>
    <text x="52" y="240" font-size="11.5" fill="#222">evolve from transactions to immersive,</text>
    <text x="52" y="258" font-size="11.5" fill="#222">AI-enabled experiences? Kotler is the</text>
    <text x="52" y="276" font-size="11.5" fill="#222">only thinker who has written the textbook</text>
    <text x="52" y="294" font-size="11.5" fill="#222">on every era from the 1960s to GenAI.</text>
    <text x="52" y="312" font-size="11.5" fill="#222">His Marketing 6.0 frames Unit 3 directly:</text>
    <text x="52" y="330" font-size="11.5" fill="#222">the phygital, immersive CX you'll deliver.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">PhD Economics, MIT (1956), studied under</text>
    <text x="52" y="428" font-size="11.5" fill="#222">Samuelson and Solow. S.C. Johnson Professor</text>
    <text x="52" y="446" font-size="11.5" fill="#222">Emeritus at Kellogg School of Management</text>
    <text x="52" y="464" font-size="11.5" fill="#222">(Northwestern), faculty since 1962. Pulled</text>
    <text x="52" y="482" font-size="11.5" fill="#222">marketing into the academic mainstream.</text>
    <text x="52" y="500" font-size="11.5" fill="#222">Long collaboration with Hermawan Kartajaya</text>
    <text x="52" y="518" font-size="11.5" fill="#222">and Iwan Setiawan on the 3.0 → 6.0 series.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. 4 Ps Marketing Mix</text>
<text x="220" y="610" font-size="10" fill="#222">Product · Price · Place ·</text>
<text x="220" y="626" font-size="10" fill="#222">Promotion (formalised by Kotler)</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. STP</text>
<text x="220" y="646" font-size="10" fill="#222">Segmentation · Targeting ·</text>
<text x="220" y="662" font-size="10" fill="#222">Positioning</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Marketing 3.0 → 6.0</text>
<text x="220" y="682" font-size="10" fill="#222">Product → Customer → Human</text>
<text x="220" y="698" font-size="10" fill="#222">→ Digital → Tech → Immersive</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Phygital Experience</text>
<text x="220" y="718" font-size="10" fill="#222">Physical + digital seamless</text>
<text x="220" y="734" font-size="10" fill="#222">overlap (in 6.0)</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Kotler 6.0 Ecosystem</text>
<text x="220" y="754" font-size="10" fill="#222">5 immersive technologies</text>
<text x="220" y="770" font-size="10" fill="#222">centred on customer value</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Map your offer onto the 4 Ps + 3 service Ps</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Run STP — segment, target, position cleanly</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Audit which Marketing era your firm is in</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Pilot one Marketing 6.0 immersive touchpoint</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Design the phygital overlap zone explicitly</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Re-anchor strategy on “humanity-centric” brand</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Marketing is the art of</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">creating genuine customer value.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Philip Kotler</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;The best advertising is done</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">by satisfied customers.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Philip Kotler</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• Frameworks can feel overlapping</text>
    <text x="455" y="636" font-size="10.5" fill="#222">(4 Ps vs 4 Cs vs 7 Ps)</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Western, B2C-centric origins</text>
    <text x="442" y="668" font-size="10.5" fill="#222">• Marketing 6.0 thesis still empirically</text>
    <text x="455" y="684" font-size="10.5" fill="#222">thin (early adopters only)</text>
    <text x="442" y="700" font-size="10.5" fill="#222">• Less guidance on backstage AI</text>
    <text x="455" y="716" font-size="10.5" fill="#222">systems (data, MarTech stack)</text>
    <text x="442" y="732" font-size="10.5" fill="#222">• Critics: “marketing has become</text>
    <text x="455" y="748" font-size="10.5" fill="#222">whatever Kotler says it is”</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• 80+ books, translated into</text>
    <text x="455" y="844" font-size="10.5" fill="#222">25+ languages</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• Marketing Management is the</text>
    <text x="455" y="876" font-size="10.5" fill="#222">global MBA bestseller (16 eds)</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• “Father of Modern Marketing”</text>
    <text x="455" y="908" font-size="10.5" fill="#222">award (AMA, 2013)</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• Marketing 6.0 directly anchors</text>
    <text x="455" y="940" font-size="10.5" fill="#222">this MARTI301 unit</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• Still publishing in his 90s</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
  <g>
    <rect x="80" y="1015" width="120" height="170" fill="#1D2660"/>
    <rect x="84" y="1019" width="112" height="162" fill="none" stroke="#FFD23F" stroke-width="1"/>
    <text x="140" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">MARKETING</text>
    <text x="140" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">MANAGEMENT</text>
    <line x1="100" y1="1088" x2="180" y2="1088" stroke="#FFD23F" stroke-width="1"/>
    <text x="140" y="1128" text-anchor="middle" font-size="9" fill="#FFD23F">The global MBA</text>
    <text x="140" y="1141" text-anchor="middle" font-size="9" fill="#FFD23F">textbook · 16th ed</text>
    <text x="140" y="1154" text-anchor="middle" font-size="9" fill="#FFD23F">(with Keller)</text>
    <text x="140" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">KOTLER · 1967</text>
  </g>

  <g>
    <rect x="240" y="1015" width="120" height="170" fill="#E63946"/>
    <rect x="244" y="1019" width="112" height="162" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="300" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">MARKETING 4.0</text>
    <line x1="260" y1="1074" x2="340" y2="1074" stroke="#FFFFFF" stroke-width="1"/>
    <text x="300" y="1128" text-anchor="middle" font-size="9" fill="#FFFFFF">Moving from</text>
    <text x="300" y="1141" text-anchor="middle" font-size="9" fill="#FFFFFF">Traditional to Digital</text>
    <text x="300" y="1154" text-anchor="middle" font-size="9" fill="#FFFFFF">(with Kartajaya)</text>
    <text x="300" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">KOTLER · 2017</text>
  </g>

  <g>
    <rect x="400" y="1015" width="120" height="170" fill="#264653"/>
    <rect x="404" y="1019" width="112" height="162" fill="none" stroke="#F4A261" stroke-width="1"/>
    <text x="460" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">MARKETING 5.0</text>
    <line x1="420" y1="1074" x2="500" y2="1074" stroke="#F4A261" stroke-width="1"/>
    <text x="460" y="1135" text-anchor="middle" font-size="9" fill="#F4A261">Technology</text>
    <text x="460" y="1148" text-anchor="middle" font-size="9" fill="#F4A261">for Humanity</text>
    <text x="460" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">KOTLER · 2021</text>
  </g>

  <g>
    <rect x="560" y="1015" width="120" height="170" fill="#7A1F2B"/>
    <rect x="564" y="1019" width="112" height="162" fill="none" stroke="#FFD23F" stroke-width="1"/>
    <text x="620" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">MARKETING 6.0</text>
    <line x1="580" y1="1074" x2="660" y2="1074" stroke="#FFD23F" stroke-width="1"/>
    <text x="620" y="1135" text-anchor="middle" font-size="9" fill="#FFD23F">The Future is</text>
    <text x="620" y="1148" text-anchor="middle" font-size="9" fill="#FFD23F">Immersive</text>
    <text x="620" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">KOTLER · 2023</text>
  </g>

  <!-- Footer -->
  <line x1="60" y1="1210" x2="740" y2="1210" stroke="#00B388" stroke-width="1.5"/>
  <text x="60" y="1228" font-size="10" fill="#1D2660">MARTI301 · Unit 3 — Customer Experience &amp; Marketing 6.0 · Slibrary</text>
