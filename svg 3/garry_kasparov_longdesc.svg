<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Garry Kasparov -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Garry Kasparov</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">Centaur Chess and the Future of Human-AI Collaboration</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">b. 1963 · Chess Grandmaster · World Champion 1985–2000</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY KASPAROV, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">How do you actually combine human</text>
    <text x="52" y="240" font-size="11.5" fill="#222">judgement with AI capability and beat</text>
    <text x="52" y="258" font-size="11.5" fill="#222">either alone? Kasparov ran the world's</text>
    <text x="52" y="276" font-size="11.5" fill="#222">first real experiment — losing to Deep</text>
    <text x="52" y="294" font-size="11.5" fill="#222">Blue in 1997, then inventing Centaur</text>
    <text x="52" y="312" font-size="11.5" fill="#222">chess. His finding became the design</text>
    <text x="52" y="330" font-size="11.5" fill="#222">principle for every augmented workflow.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">World Chess Champion at 22, longest-</text>
    <text x="52" y="428" font-size="11.5" fill="#222">reigning #1 in history (255 months).</text>
    <text x="52" y="446" font-size="11.5" fill="#222">Lost to IBM Deep Blue in 1997 — a</text>
    <text x="52" y="464" font-size="11.5" fill="#222">watershed moment for AI. In 1998 invented</text>
    <text x="52" y="482" font-size="11.5" fill="#222">“Advanced Chess” (centaur format) at the</text>
    <text x="52" y="500" font-size="11.5" fill="#222">Leon tournament. Now Chairman of the</text>
    <text x="52" y="518" font-size="11.5" fill="#222">Renew Democracy Initiative.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. Centaur Model</text>
<text x="220" y="610" font-size="10" fill="#222">Human + AI &gt; human alone</text>
<text x="220" y="626" font-size="10" fill="#222">AND &gt; AI alone</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. Advanced Chess (1998)</text>
<text x="220" y="646" font-size="10" fill="#222">First centaur tournament</text>
<text x="220" y="662" font-size="10" fill="#222">in Leon, Spain</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Process &gt; Skill</text>
<text x="220" y="682" font-size="10" fill="#222">Weak human with great process</text>
<text x="220" y="698" font-size="10" fill="#222">beats strong human with bad one</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. AI as Collaborator</text>
<text x="220" y="718" font-size="10" fill="#222">Tool that augments judgement,</text>
<text x="220" y="734" font-size="10" fill="#222">doesn't replace it</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Augmentation Hierarchy</text>
<text x="220" y="754" font-size="10" fill="#222">Human strategy · AI tactics ·</text>
<text x="220" y="770" font-size="10" fill="#222">human ethics layer on top</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Identify the judgement-rich vs pattern-rich tasks</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Hand pattern-rich tasks to AI (the engine)</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Design the human “centaur” interface carefully</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Invest in process quality over individual talent</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Train operators to challenge AI suggestions</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Measure team output, not human or AI alone</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Weak human + machine + better</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">process beats strong human alone.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Garry Kasparov</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;The future is not human vs</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">machine — it's human + machine.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Garry Kasparov</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• Centaur advantage shrinking</text>
    <text x="455" y="636" font-size="10.5" fill="#222">as AI surpasses humans (chess)</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Less applicable in domains</text>
    <text x="455" y="668" font-size="10.5" fill="#222">with no clear ground truth</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Empirical evidence mostly</text>
    <text x="455" y="700" font-size="10.5" fill="#222">from games / chess</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• Critics: AI alone now beats</text>
    <text x="455" y="732" font-size="10.5" fill="#222">centaur teams in chess (2017+)</text>
    <text x="442" y="748" font-size="10.5" fill="#222">• “Process” underspecified for</text>
    <text x="455" y="764" font-size="10.5" fill="#222">most business contexts</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• “Centaur” entered global AI</text>
    <text x="455" y="844" font-size="10.5" fill="#222">vocabulary post-2010</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• Foundation of every</text>
    <text x="455" y="876" font-size="10.5" fill="#222">augmentation playbook</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• “Deep Thinking” (2017)</text>
    <text x="455" y="908" font-size="10.5" fill="#222">reframed the AI debate</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• Direct anchor for MARTI301</text>
    <text x="455" y="940" font-size="10.5" fill="#222">Centaur Model framework</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• Inspires medical AI, legal</text>
    <text x="455" y="972" font-size="10.5" fill="#222">AI, financial AI design</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
  <g>
    <rect x="80" y="1015" width="120" height="170" fill="#1A1A1A"/>
    <rect x="84" y="1019" width="112" height="162" fill="none" stroke="#E63946" stroke-width="1"/>
    <text x="140" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">DEEP</text>
    <text x="140" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">THINKING</text>
    <line x1="100" y1="1088" x2="180" y2="1088" stroke="#E63946" stroke-width="1"/>
    <text x="140" y="1128" text-anchor="middle" font-size="9" fill="#E63946">Where Machine</text>
    <text x="140" y="1141" text-anchor="middle" font-size="9" fill="#E63946">Intelligence Ends &amp;</text>
    <text x="140" y="1154" text-anchor="middle" font-size="9" fill="#E63946">Human Creativity Begins</text>
    <text x="140" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">KASPAROV · 2017</text>
  </g>

  <g>
    <rect x="240" y="1015" width="120" height="170" fill="#1D2660"/>
    <rect x="244" y="1019" width="112" height="162" fill="none" stroke="#FFD23F" stroke-width="1"/>
    <text x="300" y="1050" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">HOW LIFE</text>
    <text x="300" y="1064" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">IMITATES</text>
    <text x="300" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">CHESS</text>
    <line x1="260" y1="1097" x2="340" y2="1097" stroke="#FFD23F" stroke-width="1"/>
    <text x="300" y="1135" text-anchor="middle" font-size="9" fill="#FFD23F">Strategy lessons</text>
    <text x="300" y="1148" text-anchor="middle" font-size="9" fill="#FFD23F">from the board</text>
    <text x="300" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">KASPAROV · 2007</text>
  </g>

  <g>
    <rect x="400" y="1015" width="120" height="170" fill="#7A1F2B"/>
    <rect x="404" y="1019" width="112" height="162" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    <text x="460" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">WINTER IS</text>
    <text x="460" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">COMING</text>
    <line x1="420" y1="1088" x2="500" y2="1088" stroke="#FFFFFF" stroke-width="1"/>
    <text x="460" y="1128" text-anchor="middle" font-size="9" fill="#FFFFFF">Why Vladimir Putin</text>
    <text x="460" y="1141" text-anchor="middle" font-size="9" fill="#FFFFFF">and the Enemies of</text>
    <text x="460" y="1154" text-anchor="middle" font-size="9" fill="#FFFFFF">the Free World...</text>
    <text x="460" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">KASPAROV · 2015</text>
  </g>

  <g>
    <rect x="560" y="1015" width="120" height="170" fill="#0F4C3A"/>
    <rect x="564" y="1019" width="112" height="162" fill="none" stroke="#FFFFFF" stroke-width="1"/>
