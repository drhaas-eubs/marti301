    <text x="620" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">PREDECESSORS</text>
    <line x1="580" y1="1088" x2="660" y2="1088" stroke="#FFFFFF" stroke-width="1"/>
    <text x="620" y="1135" text-anchor="middle" font-size="9" fill="#FFFFFF">5-volume history</text>
    <text x="620" y="1148" text-anchor="middle" font-size="9" fill="#FFFFFF">of world champions</text>
    <text x="620" y="1175" text-anchor="middle" font-size="9" font-weight="bold" fill="#FFFFFF">KASPAROV · 2003</text>
  </g>

