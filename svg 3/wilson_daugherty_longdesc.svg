<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Wilson &amp; Daugherty -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Wilson &amp; Daugherty</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">The Missing Middle and the Augmentation-Automation Spectrum</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">Accenture · Accenture Research · CTO · Human + Machine authors</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY DAUGHERTY, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">Where does the real productivity from AI</text>
    <text x="52" y="240" font-size="11.5" fill="#222">actually come from? Wilson &amp; Daugherty's</text>
    <text x="52" y="258" font-size="11.5" fill="#222">research at Accenture answers: not from</text>
    <text x="52" y="276" font-size="11.5" fill="#222">pure automation, but from the “missing</text>
    <text x="52" y="294" font-size="11.5" fill="#222">middle” — humans and AI complementing</text>
    <text x="52" y="312" font-size="11.5" fill="#222">each other. Your design map for the</text>
    <text x="52" y="330" font-size="11.5" fill="#222">augmentation-automation spectrum.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">H. James Wilson, Managing Director at</text>
    <text x="52" y="428" font-size="11.5" fill="#222">Accenture Research; Paul Daugherty,</text>
    <text x="52" y="446" font-size="11.5" fill="#222">Group Chief Executive of Technology &amp;</text>
    <text x="52" y="464" font-size="11.5" fill="#222">CTO at Accenture. Drew on a decade of</text>
    <text x="52" y="482" font-size="11.5" fill="#222">1,500-firm Accenture studies, MIT and</text>
    <text x="52" y="500" font-size="11.5" fill="#222">WEF research collaborations, and Future</text>
    <text x="52" y="518" font-size="11.5" fill="#222">of Work surveys with &gt; 100,000 workers.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. Augmentation Spectrum</text>
<text x="220" y="610" font-size="10" fill="#222">Pure automation ↔</text>
<text x="220" y="626" font-size="10" fill="#222">pure augmentation</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. Missing Middle</text>
<text x="220" y="646" font-size="10" fill="#222">Where humans + AI co-work</text>
<text x="220" y="662" font-size="10" fill="#222">(5 fusion skills)</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Trainer/Explainer/Sustainer</text>
<text x="220" y="682" font-size="10" fill="#222">3 new human roles in</text>
<text x="220" y="698" font-size="10" fill="#222">AI-augmented workflows</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Cobotics</text>
<text x="220" y="718" font-size="10" fill="#222">Collaborative robotics — AI</text>
<text x="220" y="734" font-size="10" fill="#222">and humans on shared tasks</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. MELDS Framework</text>
<text x="220" y="754" font-size="10" fill="#222">Mindset · Experiments ·</text>
<text x="220" y="770" font-size="10" fill="#222">Leadership · Data · Skills</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Map every workflow on the augmentation spectrum</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Find your missing-middle opportunities first</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Define new human roles (trainer / explainer / sustainer)</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Reskill workers for fusion skills</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Pilot cobotics in 1–2 high-volume processes</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Apply MELDS as your transformation playbook</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;The biggest gains come not</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">from automation but from the missing middle.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Wilson &amp; Daugherty</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;AI is best at amplifying</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">humans, not replacing them.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Wilson &amp; Daugherty</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• “Missing middle” hard to</text>
    <text x="455" y="636" font-size="10.5" fill="#222">measure or benchmark</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Accenture-flavoured framing</text>
    <text x="455" y="668" font-size="10.5" fill="#222">(consultancy bias)</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Less detail on cost</text>
    <text x="455" y="700" font-size="10.5" fill="#222">trade-offs of fusion skills</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• “Trainer”, “Explainer” roles</text>
    <text x="455" y="732" font-size="10.5" fill="#222">not yet HR job categories</text>
    <text x="442" y="748" font-size="10.5" fill="#222">• GenAI shifts assumptions:</text>
    <text x="455" y="764" font-size="10.5" fill="#222">some “human in the loop” goes</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• “Human + Machine” a global</text>
    <text x="455" y="844" font-size="10.5" fill="#222">bestseller in 2018</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• MELDS framework adopted by</text>
    <text x="455" y="876" font-size="10.5" fill="#222">many enterprise transformations</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• Followed by “Radically</text>
    <text x="455" y="908" font-size="10.5" fill="#222">Human” (2022) on GenAI</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• Direct anchor for MARTI301</text>
    <text x="455" y="940" font-size="10.5" fill="#222">Automation-Augmentation</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• Daugherty influences</text>
    <text x="455" y="972" font-size="10.5" fill="#222">global AI policy debates</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
