<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Jyh-An Lee et al. -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Jyh-An Lee et al.</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">AI Authorship and the Legal Frontier of Intellectual Property</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">b. ca. 1972 · Professor · Faculty of Law · CUHK</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY AL., WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">Who owns the AI-generated creative</text>
    <text x="52" y="240" font-size="11.5" fill="#222">works your firm produces? What</text>
    <text x="52" y="258" font-size="11.5" fill="#222">happens when your AI invents? Lee</text>
    <text x="52" y="276" font-size="11.5" fill="#222">and his co-editors assemble the</text>
    <text x="52" y="294" font-size="11.5" fill="#222">authoritative legal treatment of these</text>
    <text x="52" y="312" font-size="11.5" fill="#222">questions across jurisdictions — your</text>
    <text x="52" y="330" font-size="11.5" fill="#222">anchor for the Authorship Decision Tree.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">Jyh-An Lee — Professor, Faculty of Law,</text>
    <text x="52" y="428" font-size="11.5" fill="#222">Chinese University of Hong Kong (CUHK).</text>
    <text x="52" y="446" font-size="11.5" fill="#222">JSD Stanford Law School. Co-edited the</text>
    <text x="52" y="464" font-size="11.5" fill="#222">OUP volume with Reto Hilty (Max Planck)</text>
    <text x="52" y="482" font-size="11.5" fill="#222">and Kung-Chung Liu. Contributors span</text>
    <text x="52" y="500" font-size="11.5" fill="#222">Stanford, MPI, Cambridge, Tokyo, NYU.</text>
    <text x="52" y="518" font-size="11.5" fill="#222">Bridges common-law and civil-law IP traditions.</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. Authorship Decision Tree</text>
<text x="220" y="610" font-size="10" fill="#222">Is there a human author?</text>
<text x="220" y="626" font-size="10" fill="#222">Sufficient creative control?</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. AI Inventorship</text>
<text x="220" y="646" font-size="10" fill="#222">Patent law: must inventor</text>
<text x="220" y="662" font-size="10" fill="#222">be a natural person? (DABUS)</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. AI-Generated Works Spectrum</text>
<text x="220" y="682" font-size="10" fill="#222">Human-created → AI-assisted</text>
<text x="220" y="698" font-size="10" fill="#222">→ AI-directed → autonomous</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Trade Secret in ML</text>
<text x="220" y="718" font-size="10" fill="#222">Models, weights, prompts as</text>
<text x="220" y="734" font-size="10" fill="#222">protectable trade secrets</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Comparative IP Map</text>
<text x="220" y="754" font-size="10" fill="#222">EU · US · UK · CN · JP</text>
<text x="220" y="770" font-size="10" fill="#222">diverging answers — same Qs</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Map your AI outputs against the authorship test</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> Audit data ingestion for licence + IP risk</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> Decide: copyright, patent, trade secret, or none</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> Track DABUS-style inventorship cases</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> Use comparative IP map per market entry</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Build IP review into AI deployment workflow</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;AI is testing every</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">assumption of IP law.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Jyh-An Lee et al.</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;Authorship, ownership, and</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">inventorship — all up for grabs.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Jyh-An Lee et al.</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• Edited volume — uneven</text>
    <text x="455" y="636" font-size="10.5" fill="#222">depth across chapters</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Pre-LLM (2021) — GenAI</text>
    <text x="455" y="668" font-size="10.5" fill="#222">cases (NYT v OpenAI,</text>
    <text x="455" y="684" font-size="10.5" fill="#222">Getty v Stability) postdate</text>
    <text x="442" y="700" font-size="10.5" fill="#222">• Heavy academic style;</text>
    <text x="455" y="716" font-size="10.5" fill="#222">less practitioner-friendly</text>
    <text x="442" y="732" font-size="10.5" fill="#222">• Court positions evolving</text>
    <text x="455" y="748" font-size="10.5" fill="#222">fast — book ages quickly</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• Definitive comparative reference</text>
    <text x="455" y="844" font-size="10.5" fill="#222">for AI x IP scholars</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• OUP volume cited in major</text>
    <text x="455" y="876" font-size="10.5" fill="#222">AI-IP cases worldwide</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• Direct anchor for MARTI301</text>
    <text x="455" y="908" font-size="10.5" fill="#222">Unit 5 Authorship Tree</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• Lee a frequent expert at</text>
    <text x="455" y="940" font-size="10.5" fill="#222">WIPO, EU, UK IPO consultations</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• Influencing pending AI</text>
    <text x="455" y="972" font-size="10.5" fill="#222">copyright law in HK and EU</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
