  </g>

  <g>
    <rect x="400" y="1015" width="120" height="170" fill="#264653"/>
    <rect x="404" y="1019" width="112" height="162" fill="none" stroke="#F4A261" stroke-width="1"/>
    <text x="460" y="1055" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">DESIGN</text>
    <text x="460" y="1069" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">PROTECTION</text>
    <line x1="420" y1="1088" x2="500" y2="1088" stroke="#F4A261" stroke-width="1"/>
    <text x="460" y="1135" text-anchor="middle" font-size="9" fill="#F4A261">A Comparative</text>
    <text x="460" y="1148" text-anchor="middle" font-size="9" fill="#F4A261">Perspective</text>
