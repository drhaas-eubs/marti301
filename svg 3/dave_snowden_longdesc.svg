    <text x="300" y="1078" text-anchor="middle" font-size="10" font-weight="bold" fill="#FFFFFF">DECISION MAKING</text>
    <line x1="260" y1="1097" x2="340" y2="1097" stroke="#FFFFFF" stroke-width="1"/>
