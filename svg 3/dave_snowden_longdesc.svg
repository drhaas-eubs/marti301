<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1240" width="800" height="1240" font-family="Arial, Helvetica, sans-serif">
  <!-- EUBS · MARTI301 · Slibrary · Long-Desc Modal · Dave Snowden -->
  <rect width="800" height="1240" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="400" y="62" text-anchor="middle" font-size="42" font-weight="bold" fill="#1D2660">Dave Snowden</text>
  <text x="400" y="98" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D2660">The Cynefin Framework — Sense-making in Complex Systems</text>
  <text x="400" y="124" text-anchor="middle" font-size="13" font-style="italic" fill="#555">b. 1953 · Founder · Cognitive Edge / The Cynefin Co</text>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#00B388" stroke-width="2"/>

  <!-- LEFT COLUMN -->
  <!-- Section 1: WHY -->
  <rect x="40" y="170" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="191" font-size="13" font-weight="bold" fill="#FFFFFF">1. THE “WHY” — WHY SNOWDEN, WHY NOW?</text>
  <rect x="40" y="202" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="222" font-size="11.5" fill="#222">How do you choose the right decision</text>
    <text x="52" y="240" font-size="11.5" fill="#222">method when problems differ in kind,</text>
    <text x="52" y="258" font-size="11.5" fill="#222">not degree? Snowden's Cynefin framework</text>
    <text x="52" y="276" font-size="11.5" fill="#222">tells you when to act, when to probe,</text>
    <text x="52" y="294" font-size="11.5" fill="#222">and when to step back. Your sense-</text>
    <text x="52" y="312" font-size="11.5" fill="#222">making map for the messy AI projects</text>
    <text x="52" y="330" font-size="11.5" fill="#222">you'll lead.</text>

  <!-- Section 2: FOUNDATION -->
  <rect x="40" y="358" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="379" font-size="13" font-weight="bold" fill="#FFFFFF">2. INTELLECTUAL FOUNDATION</text>
  <rect x="40" y="390" width="360" height="148" fill="#F4F5F8"/>
    <text x="52" y="410" font-size="11.5" fill="#222">Welsh management consultant. Founded</text>
    <text x="52" y="428" font-size="11.5" fill="#222">Cognitive Edge (now The Cynefin Co.).</text>
    <text x="52" y="446" font-size="11.5" fill="#222">Director of IBM Institute of Knowledge</text>
    <text x="52" y="464" font-size="11.5" fill="#222">Management 1999–2005. Built Cynefin</text>
    <text x="52" y="482" font-size="11.5" fill="#222">from anthropology, complexity science,</text>
    <text x="52" y="500" font-size="11.5" fill="#222">and Snowden's own narrative-research</text>
    <text x="52" y="518" font-size="11.5" fill="#222">method (SenseMaker).</text>

  <!-- Section 3: FRAMEWORKS (yellow highlight) -->
  <rect x="40" y="556" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="577" font-size="13" font-weight="bold" fill="#FFFFFF">3. THE FRAMEWORKS · TOOLS · MODELS</text>
  <rect x="40" y="588" width="360" height="178" fill="#FFD23F"/>
    <text x="52" y="610" font-size="11.5" font-weight="bold" fill="#1D2660">1. Cynefin Framework</text>
<text x="220" y="610" font-size="10" fill="#222">Clear · Complicated · Complex</text>
<text x="220" y="626" font-size="10" fill="#222">· Chaotic · Disorder</text>
<text x="52" y="646" font-size="11.5" font-weight="bold" fill="#1D2660">2. Probe-Sense-Respond</text>
<text x="220" y="646" font-size="10" fill="#222">The complex-domain action</text>
<text x="220" y="662" font-size="10" fill="#222">cycle (vs Plan-Do-Check)</text>
<text x="52" y="682" font-size="11.5" font-weight="bold" fill="#1D2660">3. Liminal States</text>
<text x="220" y="682" font-size="10" fill="#222">Boundary regions between</text>
<text x="220" y="698" font-size="10" fill="#222">Cynefin domains</text>
<text x="52" y="718" font-size="11.5" font-weight="bold" fill="#1D2660">4. Anthro-Complexity</text>
<text x="220" y="718" font-size="10" fill="#222">Human + complex systems</text>
<text x="220" y="734" font-size="10" fill="#222">framework (Snowden's term)</text>
<text x="52" y="754" font-size="11.5" font-weight="bold" fill="#1D2660">5. Estuarine Mapping</text>
<text x="220" y="754" font-size="10" fill="#222">Recent extension for</text>
<text x="220" y="770" font-size="10" fill="#222">constraint-based design</text>

  <!-- Section 4: OPERATIONALIZATION -->
  <rect x="40" y="784" width="360" height="32" fill="#1D2660"/>
  <text x="52" y="805" font-size="13" font-weight="bold" fill="#FFFFFF">4. OPERATIONALIZATION — HOW TO USE IT</text>
  <rect x="40" y="816" width="360" height="138" fill="#F4F5F8"/>
    <text x="52" y="836" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">1.</tspan> Diagnose the domain before choosing a method</text>
    <text x="52" y="856" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">2.</tspan> In Clear domains: Sense → Categorise → Respond</text>
    <text x="52" y="876" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">3.</tspan> In Complicated: Sense → Analyse → Respond (experts)</text>
    <text x="52" y="896" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">4.</tspan> In Complex: Probe → Sense → Respond (experiments)</text>
    <text x="52" y="916" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">5.</tspan> In Chaotic: Act → Sense → Respond (stabilise first)</text>
    <text x="52" y="936" font-size="11" fill="#222"><tspan font-weight="bold" fill="#1D2660">6.</tspan> Notice when AI projects move between domains</text>

  <!-- RIGHT COLUMN -->
  
  <g id="portrait-placeholder">
    <rect x="430" y="170" width="320" height="240" fill="#FAFAFA" stroke="#1D2660" stroke-width="1.5" stroke-dasharray="4 3"/>
    <g opacity="0.40">
      <path d="M 455 402 C 455 328, 530 313, 590 313 C 650 313, 725 328, 725 402 Z" fill="#1D2660"/>
      <circle cx="590" cy="278" r="48" fill="#1D2660"/>
    </g>
    <rect x="500" y="388" width="180" height="14" fill="#FFFFFF" opacity="0.85"/>
    <text x="590" y="398" text-anchor="middle" font-size="10" font-style="italic" fill="#1D2660">[ Insert portrait sketch ]</text>
  </g>

  <!-- Quote 1 -->
  <text x="590" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;It's not about classifying</text>
  <text x="590" y="456" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">problems but about responding appropriately.&#8221;</text>
  <text x="590" y="475" text-anchor="middle" font-size="11" fill="#555">— Dave Snowden</text>

  <!-- Quote 2 -->
  <text x="590" y="510" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">&#8220;In complex domains,</text>
  <text x="590" y="528" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">retrospective coherence misleads.&#8221;</text>
  <text x="590" y="547" text-anchor="middle" font-size="11" fill="#555">— Dave Snowden</text>

  <!-- Section 5: LIMITATIONS -->
  <rect x="430" y="568" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="589" font-size="13" font-weight="bold" fill="#FFFFFF">5. LIMITATIONS — THE CRITICAL VIEW</text>
  <rect x="430" y="600" width="320" height="158" fill="#F4F5F8"/>
    <text x="442" y="620" font-size="10.5" fill="#222">• Cynefin diagnosis is</text>
    <text x="455" y="636" font-size="10.5" fill="#222">practitioner-skill dependent</text>
    <text x="442" y="652" font-size="10.5" fill="#222">• Hard to teach in a single</text>
    <text x="455" y="668" font-size="10.5" fill="#222">workshop without practice</text>
    <text x="442" y="684" font-size="10.5" fill="#222">• Some critics: framework is</text>
    <text x="455" y="700" font-size="10.5" fill="#222">itself a 2x2 dressed up</text>
    <text x="442" y="716" font-size="10.5" fill="#222">• Less actionable than</text>
    <text x="455" y="732" font-size="10.5" fill="#222">Stage-Gate or OODA in</text>
    <text x="455" y="748" font-size="10.5" fill="#222">pure execution contexts</text>
    <text x="442" y="764" font-size="10.5" fill="#222">• Welsh name hard to say</text>

  <!-- Section 6: ENDURING IMPACT -->
  <rect x="430" y="776" width="320" height="32" fill="#1D2660"/>
  <text x="442" y="797" font-size="13" font-weight="bold" fill="#FFFFFF">6. ENDURING IMPACT</text>
  <rect x="430" y="808" width="320" height="160" fill="#F4F5F8"/>
    <text x="442" y="828" font-size="10.5" fill="#222">• Cynefin published in HBR</text>
    <text x="455" y="844" font-size="10.5" fill="#222">with Mary Boone (2007)</text>
    <text x="442" y="860" font-size="10.5" fill="#222">• Adopted by NATO, UN,</text>
    <text x="455" y="876" font-size="10.5" fill="#222">major consultancies</text>
    <text x="442" y="892" font-size="10.5" fill="#222">• Foundation of complexity-</text>
    <text x="455" y="908" font-size="10.5" fill="#222">aware project management</text>
    <text x="442" y="924" font-size="10.5" fill="#222">• Strong influence on agile</text>
    <text x="455" y="940" font-size="10.5" fill="#222">+ data-science workflows</text>
    <text x="442" y="956" font-size="10.5" fill="#222">• Direct anchor for MARTI301</text>
    <text x="455" y="972" font-size="10.5" fill="#222">Unit 2 Cynefin framework</text>

  <!-- Books -->
  <text x="60" y="990" font-size="13" font-weight="bold" fill="#1D2660">SELECTED WORKS</text>
  <line x1="60" y1="998" x2="740" y2="998" stroke="#00B388" stroke-width="1"/>
  
